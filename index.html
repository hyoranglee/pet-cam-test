<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>멍냥 카메라 — 자동 셔터 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EF; --card:#FFFFFF; --coral:#FF7E67; --coral-d:#E8543B;
    --mint:#5FC9A6; --yellow:#FFC861; --ink:#5A463B; --muted:#AC9A8E; --line:#F1E4D9;
    --shadow:0 6px 20px rgba(120,80,50,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--cream);color:var(--ink);
       font-family:"Noto Sans KR",-apple-system,sans-serif;}
  .jua{font-family:"Jua",sans-serif;font-weight:400;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* Header */
  #topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 6px;}
  #petchip{display:flex;align-items:center;gap:10px;background:var(--card);border:none;
           border-radius:999px;padding:6px 14px 6px 6px;box-shadow:var(--shadow);cursor:pointer;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--yellow);
          display:flex;align-items:center;justify-content:center;font-size:20px;}
  #petname{font-size:16px;}#petsub{font-size:11px;color:var(--muted);}
  #logo{margin-left:auto;font-size:22px;color:var(--coral);}

  /* Tabs */
  #tabs{display:flex;gap:6px;background:#F4E7DC;border-radius:999px;padding:4px;margin:8px 16px;}
  .tab{flex:1;border:none;background:transparent;padding:9px 0;border-radius:999px;
       font-size:15px;color:var(--muted);font-family:"Jua";}
  .tab.on{background:var(--card);color:var(--coral);box-shadow:0 2px 8px rgba(120,80,50,.12);}

  /* Camera */
  #stage{position:relative;margin:8px 16px;border-radius:26px;overflow:hidden;
         background:#241c17;aspect-ratio:3/4;box-shadow:var(--shadow);}
  video,#overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #status{position:absolute;top:14px;left:50%;transform:translateX(-50%);
          background:rgba(255,255,255,.92);color:var(--ink);padding:8px 16px;border-radius:999px;
          font-family:"Jua";font-size:15px;white-space:nowrap;box-shadow:var(--shadow);}
  #lockwrap{position:absolute;top:52px;left:50%;transform:translateX(-50%);
            width:130px;height:6px;border-radius:3px;background:rgba(255,255,255,.35);overflow:hidden;}
  #lockfill{height:100%;width:0;background:var(--mint);border-radius:3px;transition:width .12s;}

  /* Controls below cam */
  #controls{padding:4px 16px 18px;}
  #sounds{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
  #sounds::-webkit-scrollbar{display:none;}
  .snd{flex:0 0 auto;background:var(--card);border:2px solid var(--line);color:var(--ink);
       padding:9px 15px;border-radius:999px;font-size:14px;font-family:"Jua";box-shadow:var(--shadow);}
  .snd:active{background:var(--coral);color:#fff;border-color:var(--coral);transform:scale(.95);}
  .snd.rec{color:var(--coral);border-color:var(--coral);}
  .snd.sel{background:var(--mint);color:#fff;border-color:var(--mint);}
  .snd.recording{background:var(--coral);color:#fff;animation:pulse .8s infinite;}
  @keyframes pulse{50%{opacity:.6;}}

  #shutterrow{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:14px;}
  #gear{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);background:var(--card);
        font-size:20px;color:var(--muted);box-shadow:var(--shadow);}
  #shutter{width:78px;height:78px;border-radius:50%;border:6px solid #fff;background:var(--coral);
           box-shadow:0 6px 18px rgba(232,84,59,.4);display:flex;align-items:center;justify-content:center;}
  #shutter:active{transform:scale(.92);}
  #shutter svg{width:38px;height:38px;fill:#fff;}
  #spacer{width:46px;}

  /* Advanced drawer */
  #adv{margin:0 16px 16px;background:var(--card);border-radius:20px;box-shadow:var(--shadow);
       padding:16px;display:none;}
  #adv h3{font-family:"Jua";font-size:15px;margin:0 0 4px;}
  #adv .hint{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.6;}
  .sens{display:flex;gap:8px;margin-bottom:14px;}
  .sens button{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;padding:10px 0;
               font-family:"Jua";font-size:14px;color:var(--muted);}
  .sens button.on{border-color:var(--coral);color:var(--coral);background:#FFF1ED;}
  .raw{font-size:11px;color:var(--muted);}
  .raw summary{cursor:pointer;margin-bottom:8px;}
  .row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12px;}
  .row input[type=range]{flex:1;accent-color:var(--coral);}
  .row b{min-width:40px;text-align:right;color:var(--ink);}

  /* Album */
  #album{padding:8px 16px 24px;}
  #petStrip{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;scrollbar-width:none;}
  #petStrip::-webkit-scrollbar{display:none;}
  .petface{flex:0 0 auto;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:5px;width:66px;}
  .petface .fc{width:58px;height:58px;border-radius:50%;background:var(--yellow);background-size:cover;background-position:center;
       display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid transparent;box-shadow:var(--shadow);}
  .petface.on .fc{border-color:var(--coral);}
  .petface .fn{font-family:"Jua";font-size:12px;color:var(--muted);max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .petface.on .fn{color:var(--coral);}
  .petface.add .fc{background:#FFF1ED;color:var(--coral);border:2px dashed var(--coral);font-size:28px;}
  #grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  #grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;box-shadow:var(--shadow);}
  #empty{text-align:center;color:var(--muted);padding:60px 20px;}
  #empty .big{font-size:48px;}#empty p{font-family:"Jua";font-size:16px;margin:10px 0 0;}
  .snd.voicechip{display:inline-flex;align-items:center;gap:8px;}
  .vdel{font-size:11px;width:18px;height:18px;border-radius:50%;background:rgba(90,70,59,.12);
        display:inline-flex;align-items:center;justify-content:center;}

  /* Sheets / modal */
  .sheet{position:fixed;inset:0;background:rgba(60,40,30,.45);display:none;
         align-items:flex-end;justify-content:center;z-index:30;}
  .sheet.on{display:flex;}
  .sheetbox{background:var(--cream);width:100%;max-width:480px;border-radius:26px 26px 0 0;
            padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(0,0,0,.2);}
  .sheetbox h2{font-family:"Jua";font-size:20px;margin:0 0 16px;text-align:center;}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;}
  .input{width:100%;border:2px solid var(--line);border-radius:14px;padding:12px 14px;
         font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;padding:11px 0;
              font-family:"Jua";font-size:15px;color:var(--muted);}
  .seg button.on{border-color:var(--coral);color:var(--coral);background:#FFF1ED;}
  .toggle{display:flex;align-items:center;justify-content:space-between;margin:16px 0 0;font-size:15px;}
  .sw{width:48px;height:28px;border-radius:999px;background:#E2D3C6;position:relative;transition:.2s;}
  .sw.on{background:var(--mint);}
  .sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;}
  .sw.on i{left:23px;}
  .bigbtn{width:100%;margin-top:22px;border:none;background:var(--coral);color:#fff;
          border-radius:16px;padding:15px;font-family:"Jua";font-size:17px;box-shadow:var(--shadow);}
  .bigbtn:disabled{background:#E7CFC6;}
  .petlist{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
  .petrow{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--line);
          border-radius:16px;padding:10px 14px;}
  .petrow.on{border-color:var(--coral);}
  .petrow .nm{font-family:"Jua";font-size:16px;}.petrow .sb{font-size:11px;color:var(--muted);}
  .addbtn{width:100%;border:2px dashed var(--coral);color:var(--coral);background:#FFF7F4;
          border-radius:16px;padding:13px;font-family:"Jua";font-size:15px;}

  /* Lightbox */
  #light{position:fixed;inset:0;background:rgba(30,20,15,.92);display:none;flex-direction:column;
         align-items:center;justify-content:center;z-index:40;padding:20px;}
  #light.on{display:flex;}
  #light img{max-width:100%;max-height:64vh;border-radius:18px;}
  #fxRow{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
  .fx{border:2px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:999px;
      padding:8px 15px;font-family:"Jua";font-size:14px;}
  .fx.on{background:var(--yellow);border-color:var(--yellow);color:var(--ink);}
  #light .acts{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center;}
  #light a,#light button{border:2px solid #fff;background:transparent;color:#fff;border-radius:14px;
         padding:11px 20px;font-family:"Jua";font-size:15px;text-decoration:none;}

  #loading{position:absolute;inset:0;background:#241c17;color:#fff;display:flex;
           align-items:center;justify-content:center;text-align:center;padding:24px;
           font-family:"Jua";font-size:16px;line-height:1.7;border-radius:26px;}
  .paw{font-size:30px;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="petchip" onclick="openPets()">
      <span class="avatar" id="petAvatar">🐾</span>
      <span><span class="jua" id="petname">우리 아이</span><br><span id="petsub">등록해 주세요</span></span>
    </button>
    <span id="logo">🐾</span>
  </div>

  <div id="tabs">
    <button class="tab on jua" id="tabCam" onclick="showTab('cam')">카메라</button>
    <button class="tab jua" id="tabAlbum" onclick="showTab('album')">앨범</button>
  </div>

  <!-- CAMERA -->
  <div id="camera">
    <div id="stage">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div id="status">준비 중…</div>
      <div id="lockwrap"><div id="lockfill"></div></div>
      <div id="loading"><div><div class="paw">🐾</div>카메라랑 AI 모델<br>준비하고 있어요…</div></div>
    </div>

    <div id="controls">
      <div id="sounds"></div>
      <div id="shutterrow">
        <button id="gear" onclick="toggleAdv()">⚙</button>
        <button id="shutter" onclick="manualShot()" aria-label="촬영">
          <svg viewBox="0 0 24 24"><path d="M12 8.5c-2 0-3.5 1.5-3.5 3.5S10 15.5 12 15.5 15.5 14 15.5 12 14 8.5 12 8.5zm5.5-2.5a2 2 0 100-4 2 2 0 000 4zM4.5 6.5a2 2 0 100-4 2 2 0 000 4zM2 12a2 2 0 104 0 2 2 0 00-4 0zm18 0a2 2 0 104 0 2 2 0 00-4 0z"/></svg>
        </button>
        <span id="spacer"></span>
      </div>

      <div id="adv">
        <h3>민감도</h3>
        <p class="hint">자주 멋대로 찍히면 '엄격', 잘 안 찍히면 '쉽게'로 바꿔보세요.</p>
        <div class="sens" id="sensRow">
          <button data-s="high" onclick="setSens('high')">쉽게</button>
          <button data-s="med" class="on" onclick="setSens('med')">보통</button>
          <button data-s="low" onclick="setSens('low')">엄격</button>
        </div>
        <details class="raw">
          <summary>고급 (개발용 미세조정)</summary>
          <div class="row"><span style="min-width:80px">최소 크기</span><input id="minArea" type="range" min="2" max="40" value="10"><b id="minAreaV">10%</b></div>
          <div class="row"><span style="min-width:80px">중앙 허용</span><input id="center" type="range" min="10" max="50" value="28"><b id="centerV">28%</b></div>
          <div class="row"><span style="min-width:80px">안정 프레임</span><input id="streak" type="range" min="1" max="10" value="4"><b id="streakV">4</b></div>
          <div class="row"><span style="min-width:80px">최소 신뢰도</span><input id="conf" type="range" min="30" max="90" value="55"><b id="confV">55%</b></div>
          <p style="margin-top:8px">여기서 찾은 값을 iOS의 AutoShutterController에 그대로 넣으세요.</p>
        </details>
      </div>
    </div>
  </div>

  <!-- ALBUM -->
  <div id="album" style="display:none;">
    <div id="petStrip"></div>
    <div id="grid"></div>
    <div id="empty" style="display:none;"><div class="big">🐾</div><p>아직 사진이 없어요<br>카메라로 첫 컷을 찍어보세요!</p></div>
  </div>
</div>

<!-- Pet sheet -->
<div class="sheet" id="petSheet"><div class="sheetbox">
  <h2>우리 아이들</h2>
  <div class="petlist" id="petList"></div>
  <button class="addbtn" onclick="openAdd()">+ 새로운 아이 등록</button>
</div></div>

<!-- Add pet sheet -->
<div class="sheet" id="addSheet"><div class="sheetbox">
  <h2>반려동물 등록 🐾</h2>
  <label class="fld">이름</label>
  <input class="input" id="inName" placeholder="예: 초코" oninput="checkAdd()">
  <label class="fld">종류</label>
  <div class="seg" id="typeSeg">
    <button data-t="dog" class="on" onclick="pick('type','dog')">강아지</button>
    <button data-t="cat" onclick="pick('type','cat')">고양이</button>
    <button data-t="other" onclick="pick('type','other')">기타</button>
  </div>
  <label class="fld">성별</label>
  <div class="seg" id="sexSeg">
    <button data-x="male" class="on" onclick="pick('sex','male')">남아</button>
    <button data-x="female" onclick="pick('sex','female')">여아</button>
  </div>
  <div class="toggle"><span>생일을 알아요</span><div class="sw" id="bdaySw" onclick="toggleBday()"><i></i></div></div>
  <input class="input" id="inBday" type="date" style="display:none;margin-top:10px;">
  <button class="bigbtn" id="saveBtn" onclick="savePet()" disabled>저장</button>
</div></div>

<!-- Lightbox -->
<div id="light"><img id="lightImg">
  <div id="fxRow">
    <button class="fx on" id="fxOff" onclick="setFx(null,this)">원본</button>
    <button class="fx" onclick="setFx('standard',this)">✨ 기본</button>
    <button class="fx" onclick="setFx('darkFur',this)">검은 털</button>
    <button class="fx" onclick="setFx('lightFur',this)">밝은 털</button>
  </div>
  <div class="acts">
    <a id="lightDl" download="pet.jpg">저장</a>
    <button id="saveFxBtn" onclick="saveEnhanced()" style="display:none">앨범에 추가</button>
    <button onclick="setRepresentative()">대표 얼굴로</button>
    <button onclick="deleteCurrent()">삭제</button>
    <button onclick="closeLight()">닫기</button>
  </div></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
/* ---------- persistence ---------- */
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('petcam',1);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('photos')){const s=d.createObjectStore('photos',{keyPath:'id'});s.createIndex('pet','petId');}
    if(!d.objectStoreNames.contains('voices'))d.createObjectStore('voices',{keyPath:'id'});};
  r.onsuccess=e=>{db=e.target.result;res();};r.onerror=()=>rej(r.error);});}
const store=(n,m)=>db.transaction(n,m).objectStore(n);
const idbPut=(n,v)=>new Promise((res,rej)=>{const r=store(n,'readwrite').put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const idbDel=(n,k)=>new Promise((res)=>{const r=store(n,'readwrite').delete(k);r.onsuccess=()=>res();});
const idbAll=(n)=>new Promise((res)=>{const o=[];const r=store(n,'readonly').openCursor();r.onsuccess=e=>{const c=e.target.result;if(c){o.push(c.value);c.continue();}else res(o);};});
function photosFor(petId){return new Promise((res)=>{const o=[];const r=store('photos','readonly').index('pet').openCursor(IDBKeyRange.only(petId));
  r.onsuccess=e=>{const c=e.target.result;if(c){o.push(c.value);c.continue();}else res(o.sort((a,b)=>b.ts-a.ts));};});}

let pets=JSON.parse(localStorage.getItem('pets')||'[]');
let activeId=localStorage.getItem('active')||null;
const savePets=()=>{localStorage.setItem('pets',JSON.stringify(pets));localStorage.setItem('active',activeId||'');};
const active=()=>pets.find(p=>p.id===activeId);

/* ---------- thresholds ---------- */
const T={minArea:.10,center:.28,streak:4,conf:.55};
const SENS={high:{minArea:.06,center:.34,streak:3,conf:.45},med:{minArea:.10,center:.28,streak:4,conf:.55},low:{minArea:.16,center:.22,streak:6,conf:.65}};
let sens=localStorage.getItem('sens')||'med';
function applySens(s){sens=s;localStorage.setItem('sens',s);Object.assign(T,SENS[s]);
  document.querySelectorAll('#sensRow button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  syncRaw();}
function setSens(s){applySens(s);}
function syncRaw(){minArea.value=Math.round(T.minArea*100);minAreaV.textContent=minArea.value+'%';
  center.value=Math.round(T.center*100);centerV.textContent=center.value+'%';
  streak.value=T.streak;streakV.textContent=T.streak;conf.value=Math.round(T.conf*100);confV.textContent=conf.value+'%';}
function bindRaw(id,key,fmt,scale){const el=document.getElementById(id),o=document.getElementById(id+'V');
  el.oninput=()=>{T[key]=el.value*scale;o.textContent=fmt(el.value);};}
bindRaw('minArea','minArea',v=>v+'%',.01);bindRaw('center','center',v=>v+'%',.01);
bindRaw('streak','streak',v=>v,1);bindRaw('conf','conf',v=>v+'%',.01);
function toggleAdv(){adv.style.display=adv.style.display==='block'?'none':'block';}

/* ---------- sounds ---------- */
let actx;const SYN={squeak:[1500,2400,140,'삑삑이'],meow:[600,420,300,'야옹'],bird:[2600,3200,90,'새소리'],bell:[900,1400,200,'초인종'],kiss:[1800,1200,120,'쪽쪽']};
let selectedSound=null;
function playSyn(name){actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const[f1,f2,ms]=SYN[name];const o=actx.createOscillator(),g=actx.createGain();
  o.frequency.setValueAtTime(f1,actx.currentTime);o.frequency.linearRampToValueAtTime(f2,actx.currentTime+ms/1000);
  g.gain.setValueAtTime(.22,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+ms/1000);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+ms/1000);}
function playSelected(){if(!selectedSound)return;
  if(selectedSound.kind==='syn')playSyn(selectedSound.name);else new Audio(selectedSound.dataUrl).play();}
function chooseSound(btn,snd){
  if(selectedSound&&selectedSound.key===snd.key){selectedSound=null;btn.classList.remove('sel');return;}
  selectedSound=snd;document.querySelectorAll('.snd').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');playSelected();}
async function renderSounds(){const row=document.getElementById('sounds');row.innerHTML='';
  Object.keys(SYN).forEach(k=>{const b=document.createElement('button');b.className='snd';b.textContent=SYN[k][3];
    const snd={kind:'syn',name:k,key:'syn:'+k};if(selectedSound&&selectedSound.key===snd.key)b.classList.add('sel');
    b.onclick=()=>chooseSound(b,snd);row.appendChild(b);});
  const voices=await idbAll('voices');
  voices.forEach(v=>{const wrap=document.createElement('div');wrap.className='snd voicechip';
    const snd={kind:'voice',dataUrl:v.dataUrl,key:'voice:'+v.id};if(selectedSound&&selectedSound.key===snd.key)wrap.classList.add('sel');
    const lbl=document.createElement('span');lbl.textContent='🎵 '+v.name;lbl.onclick=()=>chooseSound(wrap,snd);
    const del=document.createElement('span');del.className='vdel';del.textContent='✕';
    del.onclick=e=>{e.stopPropagation();deleteVoice(v.id);};
    wrap.appendChild(lbl);wrap.appendChild(del);row.appendChild(wrap);});
  const rec=document.createElement('button');rec.className='snd rec';rec.id='recBtn';rec.textContent='🎤 내 목소리';
  rec.onclick=recordVoice;row.appendChild(rec);}
async function deleteVoice(id){if(!confirm('이 녹음을 삭제할까요?'))return;
  if(selectedSound&&selectedSound.key==='voice:'+id)selectedSound=null;
  await idbDel('voices',id);renderSounds();}
async function recordVoice(){const btn=document.getElementById('recBtn');
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});
    const rec=new MediaRecorder(s);const chunks=[];rec.ondataavailable=e=>chunks.push(e.data);
    rec.onstop=async()=>{s.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:rec.mimeType});const url=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const n=(await idbAll('voices')).length+1;await idbPut('voices',{id:'v'+Date.now(),name:'목소리'+n,dataUrl:url});renderSounds();};
    btn.classList.add('recording');btn.textContent='🔴 녹음 중…';rec.start();
    setTimeout(()=>{if(rec.state!=='inactive')rec.stop();},3000);}
  catch(e){alert('마이크 권한이 필요해요.');}}

/* ---------- camera ---------- */
const video=document.getElementById('video'),overlay=document.getElementById('overlay'),octx=overlay.getContext('2d');
const statusEl=document.getElementById('status'),lockfill=document.getElementById('lockfill');
async function startCamera(){const hi={width:{ideal:1920},height:{ideal:1080}};
  for(const c of[{video:{facingMode:{ideal:'environment'},...hi}},{video:{...hi}},{video:true}]){
  try{const s=await navigator.mediaDevices.getUserMedia(c);video.srcObject=s;await video.play();return true;}catch(e){}}return false;}

/* sharpness + motion */
const sc=document.createElement('canvas');sc.width=sc.height=160;const sctx=sc.getContext('2d',{willReadFrequently:true});
function sharpness(cv){sctx.drawImage(cv,0,0,160,160);const d=sctx.getImageData(0,0,160,160).data;const g=new Float32Array(160*160);
  for(let i=0;i<160*160;i++)g[i]=.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2];
  let s=0,sq=0,n=0;for(let y=1;y<159;y++)for(let x=1;x<159;x++){const i=y*160+x;
    const l=4*g[i]-g[i-1]-g[i+1]-g[i-160]-g[i+160];s+=l;sq+=l*l;n++;}const m=s/n;return Math.round(sq/n-m*m);}
const mc=document.createElement('canvas');mc.width=mc.height=64;const mctx=mc.getContext('2d',{willReadFrequently:true});
let prevGray=null;
function motion(){mctx.drawImage(video,0,0,64,64);const d=mctx.getImageData(0,0,64,64).data;const g=new Float32Array(64*64);
  for(let i=0;i<64*64;i++)g[i]=.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2];
  if(!prevGray){prevGray=g;return 999;}let diff=0;for(let i=0;i<g.length;i++)diff+=Math.abs(g[i]-prevGray[i]);prevGray=g;return diff/g.length;}
function grab(){const c=document.createElement('canvas');c.width=video.videoWidth;c.height=video.videoHeight;c.getContext('2d').drawImage(video,0,0);return c;}
function compress(cv,max=1600,q=.92){const s=Math.min(1,max/Math.max(cv.width,cv.height));const w=Math.round(cv.width*s),h=Math.round(cv.height*s);
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(cv,0,0,w,h);return c.toDataURL('image/jpeg',q);}

/* ---------- auto-shutter ---------- */
const SPECIES=['dog','cat','bird'];
let model,state='search',streakN=0,burst=[],lastShot=0;const BURST=6,COOLDOWN=2000;
function goodPet(preds){const fw=video.videoWidth,fh=video.videoHeight;let best=null,ba=0;
  for(const p of preds){if(!SPECIES.includes(p.class)||p.score<T.conf)continue;
    const[x,y,w,h]=p.bbox,area=(w*h)/(fw*fh);if(area<T.minArea)continue;
    const cx=(x+w/2)/fw-.5,cy=(y+h/2)/fh-.5;if(Math.hypot(cx,cy)>T.center)continue;
    if(area>ba){ba=area;best=p;}}return best;}
function drawBoxes(preds,locked){overlay.width=video.videoWidth;overlay.height=video.videoHeight;octx.clearRect(0,0,overlay.width,overlay.height);
  for(const p of preds){if(!SPECIES.includes(p.class))continue;const[x,y,w,h]=p.bbox;
    octx.strokeStyle=(locked===p)?'#5FC9A6':'rgba(255,255,255,.55)';octx.lineWidth=4;
    octx.beginPath();octx.roundRect(x,y,w,h,16);octx.stroke();}}
function setStatus(t){statusEl.textContent=t;}
function clearOverlay(){overlay.width=video.videoWidth;overlay.height=video.videoHeight;octx.clearRect(0,0,overlay.width,overlay.height);}

async function loop(){
  if(model&&video.readyState>=2&&!petSheetOpen()){
    if(state==='cooldown'){if(Date.now()-lastShot>COOLDOWN){state='search';setStatus('우리 아이 찾는 중…');}}
    else if(state==='capturing'){burst.push(grab());if(burst.length>=BURST)finishBurst();}
    else{
      const isOther=active()&&active().type==='other';
      if(isOther){const mv=motion();const thr=sens==='high'?9:sens==='low'?4:6;
        if(mv<thr){streakN++;setStatus('가만히… 찰칵 준비!');lockfill.style.width=Math.min(100,streakN/T.streak*100)+'%';
          if(streakN>=T.streak){state='capturing';burst=[grab()];setStatus('찰칵! 연사 중');}}
        else{streakN=0;lockfill.style.width='0';setStatus('우리 아이를 비춰주세요');}
        clearOverlay();}
      else{const preds=await model.detect(video);const pet=goodPet(preds);
        if(pet){streakN++;setStatus('쳐다보는 중…');lockfill.style.width=Math.min(100,streakN/T.streak*100)+'%';
          if(streakN>=T.streak){state='capturing';burst=[grab()];setStatus('찰칵! 연사 중');}}
        else{streakN=0;lockfill.style.width='0';setStatus('우리 아이 찾는 중…');}
        drawBoxes(preds,pet);}
    }
  }
  requestAnimationFrame(loop);
}
function finishBurst(){const frames=burst;burst=[];lastShot=Date.now();streakN=0;state='cooldown';lockfill.style.width='0';setStatus('베스트 컷 고르는 중…');
  let best=null,bs=-1;for(const f of frames){const s=sharpness(f);if(s>bs){bs=s;best=f;}}if(best)saveShot(best);}
function manualShot(){playSelected();if(state==='capturing')return;burst=[grab()];state='capturing';setStatus('찰칵! 연사 중');}
async function saveShot(cv){const dataUrl=compress(cv);const pet=active();if(!pet){openAdd();return;}
  await idbPut('photos',{id:'p'+Date.now(),petId:pet.id,dataUrl,ts:Date.now()});
  const i=pets.findIndex(p=>p.id===pet.id);
  if(i>=0&&!pets[i].avatarUrl){pets[i].avatarUrl=await makeFaceAvatar(dataUrl);savePets();refreshHeader();}
  setStatus('앨범에 저장됐어요!');setTimeout(()=>{if(state!=='capturing')setStatus('우리 아이 찾는 중…');},1200);
  if(curTab==='album')renderAlbum();}

/* face cutout avatar: crops to the detected pet (head-biased), circular */
function loadImg(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=src;});}
async function makeFaceAvatar(dataUrl){const img=await loadImg(dataUrl);let box=null;
  try{const preds=await model.detect(img);let ba=0;
    for(const p of preds){if(!SPECIES.includes(p.class))continue;const[x,y,w,h]=p.bbox;if(w*h>ba){ba=w*h;box=p.bbox;}}}catch(e){}
  const S=220,c=document.createElement('canvas');c.width=c.height=S;const ctx=c.getContext('2d');
  ctx.beginPath();ctx.arc(S/2,S/2,S/2,0,Math.PI*2);ctx.clip();
  let sx,sy,side;
  if(box){const[x,y,w,h]=box;side=Math.min(w,h)*0.95;
    sx=x+w/2-side/2;sy=y+h*0.30-side/2;                 // bias upward toward the head
    sx=Math.max(0,Math.min(sx,img.naturalWidth-side));sy=Math.max(0,Math.min(sy,img.naturalHeight-side));}
  else{side=Math.min(img.naturalWidth,img.naturalHeight);sx=(img.naturalWidth-side)/2;sy=(img.naturalHeight-side)/2;}
  ctx.drawImage(img,sx,sy,side,side,0,0,S,S);return c.toDataURL('image/jpeg',.9);}

/* ---------- views ---------- */
let curTab='cam';
function showTab(t){curTab=t;document.getElementById('camera').style.display=t==='cam'?'block':'none';
  document.getElementById('album').style.display=t==='album'?'block':'none';
  tabCam.classList.toggle('on',t==='cam');tabAlbum.classList.toggle('on',t==='album');if(t==='album')renderAlbum();}
function renderPetStrip(){const strip=document.getElementById('petStrip');strip.innerHTML='';
  [...pets].reverse().forEach(p=>{const d=document.createElement('button');d.className='petface'+(p.id===activeId?' on':'');
    const fc=p.avatarUrl?`<span class="fc" style="background-image:url(${p.avatarUrl})"></span>`:`<span class="fc">${AV[p.type]}</span>`;
    d.innerHTML=fc+`<span class="fn">${p.name}</span>`;
    d.onclick=()=>{activeId=p.id;savePets();refreshHeader();renderPetStrip();renderAlbum();};strip.appendChild(d);});
  const add=document.createElement('button');add.className='petface add';
  add.innerHTML='<span class="fc">+</span><span class="fn">추가</span>';add.onclick=openAdd;strip.appendChild(add);}
async function renderAlbum(){renderPetStrip();const pet=active();const grid=document.getElementById('grid'),empty=document.getElementById('empty');
  if(!pet){grid.innerHTML='';empty.style.display='block';return;}
  const ph=await photosFor(pet.id);grid.innerHTML='';empty.style.display=ph.length?'none':'block';
  ph.forEach(p=>{const img=document.createElement('img');img.src=p.dataUrl;img.onclick=()=>openLight(p);grid.appendChild(img);});}

/* lightbox + beautify filter */
let curPhoto=null,curEnhancedUrl=null;
const PRESETS={standard:{shadow:.5,contrast:.12,warmth:.04,sat:.20},
               darkFur:{shadow:.72,contrast:.14,warmth:.05,sat:.22},
               lightFur:{shadow:.30,contrast:.10,warmth:.03,sat:.15}};
function openLight(p){curPhoto=p;curEnhancedUrl=null;lightImg.src=p.dataUrl;lightDl.href=p.dataUrl;lightDl.download='pet.jpg';
  document.querySelectorAll('.fx').forEach(b=>b.classList.remove('on'));document.getElementById('fxOff').classList.add('on');
  document.getElementById('saveFxBtn').style.display='none';document.getElementById('light').classList.add('on');}
function closeLight(){document.getElementById('light').classList.remove('on');}
async function deleteCurrent(){if(curPhoto){await idbDel('photos',curPhoto.id);closeLight();renderAlbum();}}
function setFx(name,btn){document.querySelectorAll('.fx').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(!name){curEnhancedUrl=null;lightImg.src=curPhoto.dataUrl;lightDl.href=curPhoto.dataUrl;
    document.getElementById('saveFxBtn').style.display='none';return;}
  lightImg.style.opacity=.5;
  enhance(curPhoto.dataUrl,PRESETS[name]).then(url=>{curEnhancedUrl=url;lightImg.src=url;lightImg.style.opacity=1;
    lightDl.href=url;lightDl.download='pet_보정.jpg';document.getElementById('saveFxBtn').style.display='inline-block';});}
const clamp=v=>v<0?0:v>1?1:v;
const lift=(v,a)=>v+a*(Math.pow(v,.45)-v);          // gentle shadow lift
const scurve=(v,c)=>clamp(v+c*Math.sin((v-.5)*Math.PI)); // soft S contrast
function enhance(srcUrl,p){return new Promise(res=>{const img=new Image();img.onload=()=>{
  const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0);const im=ctx.getImageData(0,0,c.width,c.height);const d=im.data;
  for(let i=0;i<d.length;i+=4){
    let r=d[i]/255,g=d[i+1]/255,b=d[i+2]/255;
    r=lift(r,p.shadow);g=lift(g,p.shadow);b=lift(b,p.shadow);
    r=scurve(r,p.contrast);g=scurve(g,p.contrast);b=scurve(b,p.contrast);
    r=clamp(r+p.warmth);b=clamp(b-p.warmth*.7);
    const lum=.299*r+.587*g+.114*b;
    r=clamp(lum+(r-lum)*(1+p.sat));g=clamp(lum+(g-lum)*(1+p.sat));b=clamp(lum+(b-lum)*(1+p.sat));
    d[i]=r*255;d[i+1]=g*255;d[i+2]=b*255;}
  ctx.putImageData(im,0,0);res(c.toDataURL('image/jpeg',.92));};img.src=srcUrl;});}
async function saveEnhanced(){if(!curEnhancedUrl)return;const pet=active();
  await idbPut('photos',{id:'p'+Date.now(),petId:pet.id,dataUrl:curEnhancedUrl,ts:Date.now()});closeLight();renderAlbum();}
async function setRepresentative(){const pet=active();if(!pet||!curPhoto)return;
  const src=curEnhancedUrl||curPhoto.dataUrl;const av=await makeFaceAvatar(src);
  const i=pets.findIndex(p=>p.id===pet.id);if(i>=0){pets[i].avatarUrl=av;savePets();refreshHeader();renderPetStrip();}closeLight();}

/* pet header + sheets */
const AV={dog:'🐶',cat:'🐱',other:'🐾'};
function refreshHeader(){const p=active();const av=document.getElementById('petAvatar');
  if(p){document.getElementById('petname').textContent=p.name;
    document.getElementById('petsub').textContent=`${p.type==='dog'?'강아지':p.type==='cat'?'고양이':'기타'} · ${ageText(p)}`;
    if(p.avatarUrl){av.textContent='';av.style.backgroundImage=`url(${p.avatarUrl})`;av.style.backgroundSize='cover';av.style.backgroundPosition='center';}
    else{av.textContent=AV[p.type];av.style.backgroundImage='';}}
  else{document.getElementById('petname').textContent='우리 아이';document.getElementById('petsub').textContent='등록해 주세요';av.textContent='🐾';av.style.backgroundImage='';}}
function ageText(p){if(!p.birthMs)return'나이 미상';const now=new Date(),b=new Date(p.birthMs);
  let y=now.getFullYear()-b.getFullYear(),m=now.getMonth()-b.getMonth();if(m<0){y--;m+=12;}
  return y<=0?`${Math.max(m,0)}개월`:m===0?`${y}살`:`${y}살 ${m}개월`;}
function petSheetOpen(){return document.getElementById('petSheet').classList.contains('on')||document.getElementById('addSheet').classList.contains('on');}
function openPets(){const list=document.getElementById('petList');list.innerHTML='';
  pets.forEach(p=>{const r=document.createElement('div');r.className='petrow'+(p.id===activeId?' on':'');
    r.innerHTML=`<span class="avatar">${AV[p.type]}</span><div style="flex:1"><div class="nm">${p.name}</div><div class="sb">${ageText(p)}</div></div>${p.id===activeId?'<span style="color:var(--coral)">✓</span>':''}`;
    r.onclick=()=>{activeId=p.id;savePets();refreshHeader();closeSheets();};list.appendChild(r);});
  document.getElementById('petSheet').classList.add('on');}
function closeSheets(){document.getElementById('petSheet').classList.remove('on');document.getElementById('addSheet').classList.remove('on');}
document.querySelectorAll('.sheet').forEach(s=>s.onclick=e=>{if(e.target===s)closeSheets();});

/* add pet */
let draft={type:'dog',sex:'male',bday:false};
function openAdd(){draft={type:'dog',sex:'male',bday:false};document.getElementById('inName').value='';
  document.querySelectorAll('#typeSeg button').forEach(b=>b.classList.toggle('on',b.dataset.t==='dog'));
  document.querySelectorAll('#sexSeg button').forEach(b=>b.classList.toggle('on',b.dataset.x==='male'));
  document.getElementById('bdaySw').classList.remove('on');document.getElementById('inBday').style.display='none';
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('petSheet').classList.remove('on');document.getElementById('addSheet').classList.add('on');}
function pick(kind,val){draft[kind]=val;const seg=kind==='type'?'#typeSeg':'#sexSeg',attr=kind==='type'?'t':'x';
  document.querySelectorAll(seg+' button').forEach(b=>b.classList.toggle('on',b.dataset[attr]===val));}
function toggleBday(){draft.bday=!draft.bday;document.getElementById('bdaySw').classList.toggle('on',draft.bday);
  document.getElementById('inBday').style.display=draft.bday?'block':'none';}
function checkAdd(){document.getElementById('saveBtn').disabled=!document.getElementById('inName').value.trim();}
function savePet(){const name=document.getElementById('inName').value.trim();if(!name)return;
  const bday=draft.bday?new Date(document.getElementById('inBday').value).getTime():null;
  const pet={id:'pet'+Date.now(),name,type:draft.type,sex:draft.sex,birthMs:isNaN(bday)?null:bday};
  pets.push(pet);activeId=pet.id;savePets();refreshHeader();closeSheets();prevGray=null;if(curTab==='album')renderAlbum();}

/* ---------- init ---------- */
(async function(){
  await openDB();applySens(sens);await renderSounds();refreshHeader();
  if(pets.length===0)openAdd();
  const ok=await startCamera();
  if(!ok){document.getElementById('loading').innerHTML='카메라 권한이 필요해요.<br>HTTPS나 localhost에서 열어주세요.';return;}
  try{model=await cocoSsd.load({base:'lite_mobilenet_v2'});}
  catch(e){document.getElementById('loading').innerHTML='AI 모델을 못 불러왔어요.<br>인터넷 연결을 확인해 주세요.';return;}
  document.getElementById('loading').style.display='none';setStatus('우리 아이 찾는 중…');loop();
})();
