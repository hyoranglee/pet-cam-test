<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>반려동물 카메라 — 자동 셔터 테스트</title>
<style>
  :root { --bg:#0d0d0f; --panel:#1a1a1f; --line:#2a2a32; --txt:#f2f2f4; --muted:#9a9aa4; --ok:#34d27b; --info:#4f9dff; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #stage { position:relative; width:100vw; max-width:560px; margin:0 auto; aspect-ratio:3/4; background:#000; overflow:hidden; }
  video, #overlay { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #status { position:absolute; top:12px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,.55); backdrop-filter:blur(8px); padding:7px 14px; border-radius:999px;
            font-size:14px; font-weight:500; white-space:nowrap; }
  #lock { position:absolute; top:50px; left:50%; transform:translateX(-50%);
          width:140px; height:4px; border-radius:2px; background:rgba(255,255,255,.18); overflow:hidden; }
  #lockfill { height:100%; width:0%; background:var(--ok); transition:width .12s; }
  #sounds { position:absolute; bottom:84px; left:0; right:0; display:flex; gap:8px; padding:0 14px;
            overflow-x:auto; scrollbar-width:none; }
  #sounds::-webkit-scrollbar { display:none; }
  .snd { flex:0 0 auto; background:rgba(255,255,255,.12); border:none; color:var(--txt);
         padding:8px 14px; border-radius:999px; font-size:13px; }
  .snd:active { background:var(--info); }
  #shutter { position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
             width:58px; height:58px; border-radius:50%; background:#fff; border:4px solid rgba(255,255,255,.4); }
  #panel { max-width:560px; margin:0 auto; padding:14px 16px 28px; }
  h2 { font-size:15px; font-weight:600; margin:18px 0 10px; }
  .row { display:flex; align-items:center; gap:12px; margin:12px 0; font-size:13px; color:var(--muted); }
  .row input[type=range] { flex:1; accent-color:var(--info); }
  .row b { color:var(--txt); min-width:42px; text-align:right; font-variant-numeric:tabular-nums; }
  #gallery { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px; }
  #gallery figure { margin:0; position:relative; }
  #gallery img { width:100%; border-radius:8px; display:block; }
  #gallery .score { position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,.6);
                    font-size:11px; padding:2px 6px; border-radius:6px; }
  #gallery a { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.6); color:#fff;
               font-size:11px; padding:3px 7px; border-radius:6px; text-decoration:none; }
  .hint { font-size:12px; color:var(--muted); line-height:1.6; }
  #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
             background:#000; font-size:14px; color:var(--muted); text-align:center; padding:24px; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="status">모델 불러오는 중…</div>
  <div id="lock"><div id="lockfill"></div></div>
  <div id="sounds">
    <button class="snd" data-f="squeak">삑삑이</button>
    <button class="snd" data-f="meow">야옹</button>
    <button class="snd" data-f="bird">새소리</button>
    <button class="snd" data-f="bell">초인종</button>
    <button class="snd" data-f="kiss">쪽쪽</button>
  </div>
  <button id="shutter" aria-label="수동 촬영"></button>
  <div id="loading">카메라와 AI 모델을 준비하고 있어요.<br>잠시만요…</div>
</div>

<div id="panel">
  <h2>임계값 튜닝 (실제 반려동물로 조정하세요)</h2>
  <div class="row"><span style="min-width:96px">최소 크기</span>
    <input id="minArea" type="range" min="2" max="40" value="10"><b id="minAreaV">10%</b></div>
  <div class="row"><span style="min-width:96px">중앙 허용범위</span>
    <input id="center" type="range" min="10" max="50" value="28"><b id="centerV">28%</b></div>
  <div class="row"><span style="min-width:96px">안정 프레임</span>
    <input id="streak" type="range" min="1" max="10" value="4"><b id="streakV">4</b></div>
  <div class="row"><span style="min-width:96px">최소 신뢰도</span>
    <input id="conf" type="range" min="30" max="90" value="55"><b id="confV">55%</b></div>

  <h2>잡은 컷 (연사 중 자동 선별)</h2>
  <p class="hint">각 컷의 숫자는 선명도 점수(라플라시안 분산)예요. 높을수록 또렷합니다. 같은 연사에서 이 점수가 가장 높은 컷이 자동 선택됩니다.</p>
  <div id="gallery"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');
const statusEl = document.getElementById('status');
const lockfill = document.getElementById('lockfill');
const gallery = document.getElementById('gallery');

// Tunables bound to sliders
const T = { minArea:0.10, center:0.28, streak:4, conf:0.55 };
function bind(id, key, fmt, scale){ const el=document.getElementById(id), out=document.getElementById(id+'V');
  el.oninput=()=>{ T[key]=el.value*scale; out.textContent=fmt(el.value); }; }
bind('minArea','minArea',v=>v+'%',0.01);
bind('center','center',v=>v+'%',0.01);
bind('streak','streak',v=>v,1);
bind('conf','conf',v=>v+'%',0.01);

// ---- Attention sounds (synthesized; real app ships recorded squeak/meow files) ----
let actx;
const sounds = {
  squeak:[1500,2400,140], meow:[600,420,300], bird:[2600,3200,90], bell:[900,1400,200], kiss:[1800,1200,120]
};
function play(name){
  actx = actx || new (window.AudioContext||window.webkitAudioContext)();
  const [f1,f2,ms]=sounds[name]; const o=actx.createOscillator(), g=actx.createGain();
  o.frequency.setValueAtTime(f1,actx.currentTime);
  o.frequency.linearRampToValueAtTime(f2,actx.currentTime+ms/1000);
  g.gain.setValueAtTime(.22,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+ms/1000);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+ms/1000);
}
document.querySelectorAll('.snd').forEach(b=>b.onclick=()=>play(b.dataset.f));

// ---- Camera ----
async function startCamera(){
  const tries=[{video:{facingMode:{ideal:'environment'}}},{video:true}];
  for(const c of tries){ try{ const s=await navigator.mediaDevices.getUserMedia(c); video.srcObject=s; await video.play(); return true; }catch(e){} }
  return false;
}

// ---- Sharpness: variance of Laplacian on a small grayscale copy ----
const sc=document.createElement('canvas'); sc.width=sc.height=160; const sctx=sc.getContext('2d',{willReadFrequently:true});
function sharpness(srcCanvas){
  sctx.drawImage(srcCanvas,0,0,160,160);
  const d=sctx.getImageData(0,0,160,160).data; const g=new Float32Array(160*160);
  for(let i=0;i<160*160;i++){ g[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2]; }
  let sum=0,sq=0,n=0;
  for(let y=1;y<159;y++) for(let x=1;x<159;x++){ const i=y*160+x;
    const lap=4*g[i]-g[i-1]-g[i+1]-g[i-160]-g[i+160]; sum+=lap; sq+=lap*lap; n++; }
  const m=sum/n; return Math.round(sq/n-m*m);
}
function grabFrame(){ const c=document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
  c.getContext('2d').drawImage(video,0,0); return c; }

// ---- Auto-shutter state machine ----
let model, state='search', goodStreak=0, burst=[], lastShot=0;
const BURST=6, COOLDOWN=2000;

function goodPet(preds){
  const fw=video.videoWidth, fh=video.videoHeight;
  let best=null, bestArea=0;
  for(const p of preds){
    if(p.class!=='dog'&&p.class!=='cat') continue;
    if(p.score<T.conf) continue;
    const [x,y,w,h]=p.bbox; const area=(w*h)/(fw*fh);
    if(area<T.minArea) continue;
    const cx=(x+w/2)/fw-0.5, cy=(y+h/2)/fh-0.5;
    if(Math.hypot(cx,cy)>T.center) continue;
    if(area>bestArea){ bestArea=area; best=p; }
  }
  return best;
}

function draw(preds, locked){
  overlay.width=video.videoWidth; overlay.height=video.videoHeight;
  octx.clearRect(0,0,overlay.width,overlay.height);
  for(const p of preds){
    if(p.class!=='dog'&&p.class!=='cat') continue;
    const [x,y,w,h]=p.bbox;
    octx.strokeStyle = (locked&&locked===p)?'#34d27b':'rgba(255,255,255,.5)';
    octx.lineWidth=3; octx.strokeRect(x,y,w,h);
  }
}

function setStatus(t){ statusEl.textContent=t; }

async function loop(){
  if(model && video.readyState>=2){
    const preds = await model.detect(video);
    if(state==='cooldown'){ if(Date.now()-lastShot>COOLDOWN) state='search'; }
    else if(state==='capturing'){
      burst.push(grabFrame());
      if(burst.length>=BURST) finishBurst();
    } else {
      const pet = goodPet(preds);
      if(pet){ goodStreak++; setStatus('쳐다보는 중…');
        lockfill.style.width = Math.min(100, goodStreak/T.streak*100)+'%';
        if(goodStreak>=T.streak){ state='capturing'; burst=[grabFrame()]; setStatus('찰칵! 연사 중'); }
      } else { goodStreak=0; lockfill.style.width='0%'; setStatus('반려동물을 찾는 중…'); }
      draw(preds, pet);
    }
    if(state==='capturing'||state==='cooldown') draw(preds, null);
  }
  requestAnimationFrame(loop);
}

function finishBurst(){
  const frames=burst; burst=[]; lastShot=Date.now(); goodStreak=0; state='cooldown';
  lockfill.style.width='0%'; setStatus('베스트 컷 고르는 중…');
  let best=null, bestScore=-1;
  for(const f of frames){ const s=sharpness(f); if(s>bestScore){ bestScore=s; best=f; } }
  if(best) addToGallery(best, bestScore);
  setTimeout(()=>{ if(state==='cooldown'&&Date.now()-lastShot>COOLDOWN) setStatus('반려동물을 찾는 중…'); }, COOLDOWN);
}

document.getElementById('shutter').onclick=()=>{ const f=grabFrame(); addToGallery(f, sharpness(f)); };

function addToGallery(canvas, score){
  const url=canvas.toDataURL('image/jpeg',0.9);
  const fig=document.createElement('figure');
  fig.innerHTML=`<img src="${url}"><span class="score">${score}</span>`+
    `<a href="${url}" download="pet_${Date.now()}.jpg">저장</a>`;
  gallery.prepend(fig);
}

(async function init(){
  const camOk=await startCamera();
  if(!camOk){ document.getElementById('loading').innerHTML='카메라 권한이 필요합니다.<br>HTTPS 또는 localhost에서 열어주세요.'; return; }
  try{ model=await cocoSsd.load({base:'lite_mobilenet_v2'}); }
  catch(e){ document.getElementById('loading').innerHTML='AI 모델 로드 실패.<br>인터넷 연결을 확인해 주세요.'; return; }
  document.getElementById('loading').style.display='none';
  setStatus('반려동물을 찾는 중…');
  loop();
})();
</script>
</body>
</html>
