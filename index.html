<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>멍냥 카메라 — 자동 셔터 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FFF6EF;--card:#FFFFFF;--coral:#FF7E67;--mint:#5FC9A6;--yellow:#FFC861;
    --ink:#5A463B;--muted:#AC9A8E;--line:#F1E4D9;--shadow:0 6px 20px rgba(120,80,50,.10);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:"Noto Sans KR",-apple-system,sans-serif;}
  .jua{font-family:"Jua",sans-serif;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  #topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 6px;}
  #petchip{display:flex;align-items:center;gap:10px;background:var(--card);border:none;border-radius:999px;
           padding:6px 14px 6px 6px;box-shadow:var(--shadow);}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--yellow);background-size:cover;background-position:center;
          display:flex;align-items:center;justify-content:center;font-size:20px;}
  #petname{font-size:16px;}#petsub{font-size:11px;color:var(--muted);}
  #logo{margin-left:auto;font-size:22px;}
  #tabs{display:flex;gap:6px;background:#F4E7DC;border-radius:999px;padding:4px;margin:8px 16px;}
  .tab{flex:1;border:none;background:transparent;padding:9px 0;border-radius:999px;font-size:15px;color:var(--muted);font-family:"Jua";}
  .tab.on{background:var(--card);color:var(--coral);box-shadow:0 2px 8px rgba(120,80,50,.12);}
  #bdayBanner{margin:2px 16px 0;background:var(--yellow);color:#7a5b14;border-radius:16px;padding:12px 16px;
              font-family:"Jua";font-size:14px;text-align:center;box-shadow:var(--shadow);}
  #stage{position:relative;margin:8px 16px;border-radius:26px;overflow:hidden;background:#241c17;aspect-ratio:3/4;box-shadow:var(--shadow);}
  video,#overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #status{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);color:var(--ink);
          padding:8px 16px;border-radius:999px;font-family:"Jua";font-size:15px;white-space:nowrap;box-shadow:var(--shadow);}
  #lockwrap{position:absolute;top:52px;left:50%;transform:translateX(-50%);width:130px;height:6px;border-radius:3px;background:rgba(255,255,255,.35);overflow:hidden;}
  #lockfill{height:100%;width:0;background:var(--mint);border-radius:3px;transition:width .12s;}
  #controls{padding:4px 16px 18px;}
  #autoRow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:16px;
           padding:11px 16px;box-shadow:var(--shadow);margin-bottom:12px;}
  #autoRow .lab{font-family:"Jua";font-size:15px;}#autoRow .sub{font-size:11px;color:var(--muted);}
  .sw{width:50px;height:28px;border-radius:999px;background:#E2D3C6;position:relative;transition:.2s;flex:0 0 auto;}
  .sw.on{background:var(--mint);}
  .sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;}
  .sw.on i{left:25px;}
  #sounds{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
  #sounds::-webkit-scrollbar{display:none;}
  .snd{flex:0 0 auto;background:var(--card);border:2px solid var(--line);color:var(--ink);padding:9px 15px;
       border-radius:999px;font-size:14px;font-family:"Jua";box-shadow:var(--shadow);}
  .snd:active{transform:scale(.95);}
  .snd.rec{color:var(--coral);border-color:var(--coral);}
  .snd.addsnd{border:2px dashed var(--coral);color:var(--coral);background:#fff;}
  .vdelbtn{border-color:#f0c9c0!important;padding:8px 10px!important;}
  .snd.sel{background:var(--mint);color:#fff;border-color:var(--mint);}
  .snd.recording{background:var(--coral);color:#fff;animation:pulse .8s infinite;}
  @keyframes pulse{50%{opacity:.6;}}
  .snd.voicechip{display:inline-flex;align-items:center;gap:8px;}
  .vdel{font-size:11px;width:18px;height:18px;border-radius:50%;background:rgba(90,70,59,.12);display:inline-flex;align-items:center;justify-content:center;}
  #shutterrow{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:14px;}
  #gear{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);background:var(--card);font-size:20px;color:var(--muted);box-shadow:var(--shadow);}
  #shutter{width:78px;height:78px;border-radius:50%;border:6px solid #fff;background:var(--coral);box-shadow:0 6px 18px rgba(232,84,59,.4);display:flex;align-items:center;justify-content:center;}
  #shutter:active{transform:scale(.92);}#shutter svg{width:38px;height:38px;fill:#fff;}#spacer{width:46px;}
  #adv{margin:14px 0 0;background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px;display:none;}
  #adv h3{font-family:"Jua";font-size:15px;margin:0 0 4px;}#adv .hint{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.6;}
  .sens{display:flex;gap:8px;}
  .sens button{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;padding:10px 0;font-family:"Jua";font-size:14px;color:var(--muted);}
  .sens button.on{border-color:var(--coral);color:var(--coral);background:#FFF1ED;}
  #album,#create{padding:8px 16px 24px;}
  #petStrip{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;scrollbar-width:none;}
  #petStrip::-webkit-scrollbar{display:none;}
  .petface{flex:0 0 auto;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:5px;width:66px;}
  .petface .fc{width:58px;height:58px;border-radius:50%;background:var(--yellow);background-size:cover;background-position:center;
       display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid transparent;box-shadow:var(--shadow);}
  .petface.on .fc{border-color:var(--coral);}
  .petface .fn{font-family:"Jua";font-size:12px;color:var(--muted);max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .petface.on .fn{color:var(--coral);}
  .petface.add .fc{background:#FFF1ED;color:var(--coral);border:2px dashed var(--coral);font-size:28px;}
  #grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  #grid .gcell{position:relative;}
  #grid .gcell img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;box-shadow:var(--shadow);display:block;}
  #grid .gcheck{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;display:none;
                align-items:center;justify-content:center;font-size:15px;}
  #grid.selecting .gcheck{display:flex;background:rgba(255,255,255,.7);color:transparent;border:2px solid #fff;}
  #grid .gcell.sel img{outline:3px solid var(--coral);outline-offset:-3px;}
  #grid .gcell.sel .gcheck{background:#fff;color:var(--coral);border-color:var(--coral);}
  #selBar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;
          display:none;align-items:center;gap:10px;background:var(--card);border-radius:18px;padding:12px 16px;
          box-shadow:0 6px 24px rgba(120,80,50,.25);z-index:50;}
  #selCount{font-family:"Jua";font-size:15px;}
  #selBar button{border:2px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;padding:9px 16px;font-family:"Jua";font-size:14px;}
  #selDel{background:var(--coral)!important;color:#fff!important;border-color:var(--coral)!important;}
  #empty{text-align:center;color:var(--muted);padding:60px 20px;}#empty .big{font-size:48px;}#empty p{font-family:"Jua";font-size:16px;margin:10px 0 0;}
  .crcard{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);border-radius:20px;
          padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);width:100%;text-align:left;}
  .crcard:active{transform:scale(.98);border-color:var(--coral);}
  .crcard .emoji{font-size:32px;}.crcard .ct{font-family:"Jua";font-size:17px;color:var(--ink);}.crcard .cd{font-size:12px;color:var(--muted);}
  .crhint{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;}
  /* modals */
  #light,#result,#player{position:fixed;inset:0;background:rgba(30,20,15,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:45;padding:20px;}
  #light.on,#result.on,#player.on{display:flex;}
  #light img,#result img,#player canvas{max-width:100%;max-height:60vh;border-radius:18px;}
  #fxRow,#resStyles{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
  .fx,#resStyles button{border:2px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:999px;padding:8px 14px;font-family:"Jua";font-size:14px;}
  .fx.on{background:var(--yellow);border-color:var(--yellow);color:var(--ink);}
  #light .acts,#result .acts,#player .acts{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center;}
  #light a,#light button,#result a,#result button,#player button{border:2px solid #fff;background:transparent;color:#fff;border-radius:14px;padding:11px 20px;font-family:"Jua";font-size:15px;text-decoration:none;}
  #recHint{color:var(--yellow);font-size:13px;margin-top:10px;min-height:18px;font-family:"Jua";}
  /* editor */
  #editor,#cropper{position:fixed;inset:0;background:var(--cream);display:none;flex-direction:column;z-index:56;max-width:480px;margin:0 auto;}
  #editor.on,#cropper.on{display:flex;}
  .edtop{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);}
  .edtop .ti{font-family:"Jua";font-size:17px;}
  .edtop button{border:none;background:transparent;font-family:"Jua";font-size:16px;color:var(--muted);}
  .edtop .save{color:#fff;background:var(--coral);border-radius:12px;padding:8px 18px;}
  .edcanvas{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden;background:#F4E7DC;min-height:46vh;}
  #edCanvas,#cropCanvas{max-width:100%;max-height:100%;border-radius:14px;box-shadow:var(--shadow);touch-action:none;cursor:grab;}
  .edtabs{display:flex;gap:6px;padding:8px 12px 0;}
  .edtab{flex:1;border:none;background:transparent;padding:10px 0;font-family:"Jua";font-size:14px;color:var(--muted);border-radius:12px 12px 0 0;}
  .edtab.on{color:var(--coral);background:var(--card);}
  .edpanel{background:var(--card);padding:12px 16px calc(14px + env(safe-area-inset-bottom));min-height:88px;max-height:30vh;overflow-y:auto;}
  .edpanel .lab{font-size:12px;color:var(--muted);margin:0 0 8px;}
  .edrow{display:flex;gap:8px;flex-wrap:wrap;}
  .hrow{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .hrow .chip{flex:0 0 auto;}
  .chip{border:2px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-family:"Jua";font-size:14px;color:var(--ink);}
  .chip.on{border-color:var(--coral);color:var(--coral);background:#FFF1ED;}
  .sw-color{width:36px;height:36px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1px var(--line);}
  .sw-color.on{box-shadow:0 0 0 3px var(--coral);}
  .edpanel input[type=range]{width:100%;accent-color:var(--coral);}
  #edItemBar{display:flex;gap:8px;align-items:center;padding:8px 14px;background:var(--card);border-top:1px solid var(--line);}
  #edItemBar .ibl{font-family:"Jua";font-size:13px;color:var(--muted);margin-right:auto;}
  #edItemBar button{border:2px solid var(--line);background:#fff;border-radius:10px;padding:7px 12px;font-family:"Jua";font-size:13px;color:var(--ink);}
  #edItemBar .del{border-color:#f0c9c0;color:var(--coral);}
  .emojibtn{font-size:22px;padding:6px 12px;}
  .edpanel .tinput{width:100%;border:2px solid var(--line);border-radius:14px;padding:11px 14px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  #picker{position:fixed;inset:0;background:rgba(60,40,30,.5);display:none;align-items:center;justify-content:center;z-index:55;padding:18px;}
  #picker.on{display:flex;}
  .pkbox{background:var(--cream);width:100%;max-width:460px;max-height:84vh;border-radius:24px;display:flex;flex-direction:column;padding:18px;box-shadow:var(--shadow);}
  .pkbox h2{font-family:"Jua";font-size:18px;text-align:center;margin:2px 0 12px;}
  #pkGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;overflow-y:auto;flex:1;}
  #pkGrid .cell{position:relative;aspect-ratio:1;}#pkGrid img{width:100%;height:100%;object-fit:cover;border-radius:12px;display:block;}
  #pkGrid .cell.sel img{outline:3px solid var(--coral);outline-offset:-3px;}
  .pkbadge{position:absolute;top:5px;left:5px;background:var(--coral);color:#fff;font-family:"Jua";font-size:12px;min-width:22px;text-align:center;padding:2px 7px;border-radius:999px;}
  .pkbox .acts{display:flex;gap:10px;margin-top:12px;}
  .pkbox .acts button{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;padding:12px;font-family:"Jua";font-size:15px;color:var(--ink);}
  #pkMake{background:var(--coral)!important;color:#fff!important;border-color:var(--coral)!important;}
  #pkMake:disabled{background:#E7CFC6!important;border-color:#E7CFC6!important;}
  /* sheets */
  .sheet{position:fixed;inset:0;background:rgba(60,40,30,.45);display:none;align-items:flex-end;justify-content:center;z-index:30;}
  .sheet.on{display:flex;}
  .sheetbox{background:var(--cream);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-radius:26px 26px 0 0;
            padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(0,0,0,.2);}
  .sheetbox h2{font-family:"Jua";font-size:20px;margin:0 0 16px;text-align:center;}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;}
  .input{width:100%;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .seg{display:flex;gap:8px;}
  .seg.wrap{flex-wrap:wrap;}.seg.wrap button{flex:0 0 auto;}
  .seg button{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;padding:11px 14px;font-family:"Jua";font-size:15px;color:var(--muted);}
  .seg button.on{border-color:var(--coral);color:var(--coral);background:#FFF1ED;}
  .toggle{display:flex;align-items:center;justify-content:space-between;margin:16px 0 0;font-size:15px;}
  .bigbtn{width:100%;margin-top:22px;border:none;background:var(--coral);color:#fff;border-radius:16px;padding:15px;font-family:"Jua";font-size:17px;box-shadow:var(--shadow);}
  .bigbtn:disabled{background:#E7CFC6;}
  .petlist{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
  .petrow{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--line);border-radius:16px;padding:10px 14px;}
  .petrow.on{border-color:var(--coral);}.petrow .nm{font-family:"Jua";font-size:16px;}.petrow .sb{font-size:11px;color:var(--muted);}
  .petdel{font-size:18px;padding:2px 4px;opacity:.65;}
  .addbtn{width:100%;border:2px dashed var(--coral);color:var(--coral);background:#FFF7F4;border-radius:16px;padding:13px;font-family:"Jua";font-size:15px;}
  #toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:rgba(40,28,22,.92);color:#fff;
         padding:11px 20px;border-radius:999px;font-family:"Jua";font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:60;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #loading{position:absolute;inset:0;background:#241c17;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;font-family:"Jua";font-size:16px;line-height:1.7;border-radius:26px;}
  .paw{font-size:30px;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="petchip" onclick="openPets()">
      <span class="avatar" id="petAvatar">🐾</span>
      <span><span class="jua" id="petname">우리 아이</span><br><span id="petsub">등록해 주세요</span></span>
    </button>
    <span id="logo">🐾</span>
  </div>
  <div id="tabs">
    <button class="tab on jua" id="tabCam" onclick="showTab('cam')">카메라</button>
    <button class="tab jua" id="tabAlbum" onclick="showTab('album')">앨범</button>
    <button class="tab jua" id="tabCreate" onclick="showTab('create')">만들기</button>
  </div>
  <div id="bdayBanner" onclick="makeBirthday()" style="display:none;"></div>

  <div id="camera">
    <div id="stage">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div id="status">준비 중…</div>
      <div id="lockwrap"><div id="lockfill"></div></div>
      <div id="loading"><div><div class="paw">🐾</div>카메라랑 AI 모델<br>준비하고 있어요…</div></div>
    </div>
    <div id="controls">
      <div id="autoRow">
        <span><span class="lab" id="autoLabel">자동 촬영 꺼짐</span><br><span class="sub">켜면 쳐다볼 때 알아서 찍어요</span></span>
        <div class="sw" id="autoSw" onclick="toggleAuto()"><i></i></div>
      </div>
      <div id="sounds"></div>
      <div id="shutterrow">
        <button id="gear" onclick="toggleAdv()">⚙</button>
        <button id="shutter" onclick="manualShot()" aria-label="촬영">
          <svg viewBox="0 0 24 24"><path d="M12 8.5c-2 0-3.5 1.5-3.5 3.5S10 15.5 12 15.5 15.5 14 15.5 12 14 8.5 12 8.5zm5.5-2.5a2 2 0 100-4 2 2 0 000 4zM4.5 6.5a2 2 0 100-4 2 2 0 000 4zM2 12a2 2 0 104 0 2 2 0 00-4 0zm18 0a2 2 0 104 0 2 2 0 00-4 0z"/></svg>
        </button>
        <span id="spacer"></span>
      </div>
      <div id="adv">
        <h3>민감도</h3>
        <p class="hint">자주 멋대로 찍히면 '엄격', 잘 안 찍히면 '쉽게'로.</p>
        <div class="sens" id="sensRow">
          <button data-s="high" onclick="setSens('high')">쉽게</button>
          <button data-s="med" class="on" onclick="setSens('med')">보통</button>
          <button data-s="low" onclick="setSens('low')">엄격</button>
        </div>
      </div>
    </div>
  </div>

  <div id="album" style="display:none;">
    <div id="petStrip"></div>
    <div id="grid"></div>
    <div id="empty" style="display:none;"><div class="big">🐾</div><p>아직 사진이 없어요<br>카메라로 첫 컷을 찍어보세요!</p></div>
  </div>

  <div id="create" style="display:none;">
    <button class="crcard" onclick="makeSticker()"><span class="emoji">✨</span><span><span class="ct">사진 꾸미기</span><br><span class="cd">위치·프레임·스티커·글씨 직접 편집</span></span></button>
    <button class="crcard" onclick="makeBirthday()"><span class="emoji">🎂</span><span><span class="ct">생일 카드</span><br><span class="cd">사진 1장으로 생일 축하 카드</span></span></button>
    <button class="crcard" onclick="makeHighlight()"><span class="emoji">🎬</span><span><span class="ct">하이라이트 영상</span><br><span class="cd">고른 사진들로 슬라이드쇼</span></span></button>
    <button class="crcard" onclick="makeThenNow()"><span class="emoji">📈</span><span><span class="ct">그때 vs 지금</span><br><span class="cd">두 사진을 골라 나란히</span></span></button>
    <button class="crcard" onclick="makeFourCut()"><span class="emoji">🎞️</span><span><span class="ct">네컷 사진</span><br><span class="cd">사진 4장 골라 인생네컷</span></span></button>
    <p class="crhint">사진을 먼저 몇 장 찍어두면 더 예쁘게 만들어져요 🐾</p>
  </div>
</div>

<!-- Pet sheet -->
<div class="sheet" id="petSheet"><div class="sheetbox">
  <h2>우리 아이들</h2>
  <div class="petlist" id="petList"></div>
  <button class="addbtn" onclick="openAdd()">+ 새로운 아이 등록</button>
</div></div>

<!-- Selection bar (album multi-delete) -->
<div id="selBar">
  <span id="selCount">0개 선택</span>
  <span style="flex:1"></span>
  <button onclick="exitSelect()">취소</button>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
/* ---------- storage ---------- */
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('petcam',1);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('photos')){const s=d.createObjectStore('photos',{keyPath:'id'});s.createIndex('pet','petId');}
    if(!d.objectStoreNames.contains('voices'))d.createObjectStore('voices',{keyPath:'id'});};
  r.onsuccess=e=>{db=e.target.result;res();};r.onerror=()=>rej(r.error);});}
const store=(n,m)=>db.transaction(n,m).objectStore(n);
const idbPut=(n,v)=>new Promise((res,rej)=>{const r=store(n,'readwrite').put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const idbDel=(n,k)=>new Promise(res=>{const r=store(n,'readwrite').delete(k);r.onsuccess=()=>res();});
const idbAll=(n)=>new Promise(res=>{const o=[];const r=store(n,'readonly').openCursor();r.onsuccess=e=>{const c=e.target.result;if(c){o.push(c.value);c.continue();}else res(o);};});
function photosFor(id){return new Promise(res=>{const o=[];const r=store('photos','readonly').index('pet').openCursor(IDBKeyRange.only(id));
  r.onsuccess=e=>{const c=e.target.result;if(c){o.push(c.value);c.continue();}else res(o.sort((a,b)=>b.ts-a.ts));};});}

let pets=JSON.parse(localStorage.getItem('pets')||'[]');
let activeId=localStorage.getItem('active')||null;
const savePets=()=>{localStorage.setItem('pets',JSON.stringify(pets));localStorage.setItem('active',activeId||'');};
const active=()=>pets.find(p=>p.id===activeId);

/* ---------- thresholds + auto toggle ---------- */
const T={minArea:.10,center:.28,streak:4,conf:.55};
const SENS={high:{minArea:.06,center:.34,streak:3,conf:.45},med:{minArea:.10,center:.28,streak:4,conf:.55},low:{minArea:.16,center:.22,streak:6,conf:.65}};
let sens=localStorage.getItem('sens')||'med';
function applySens(s){sens=s;localStorage.setItem('sens',s);Object.assign(T,SENS[s]);
  document.querySelectorAll('#sensRow button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));}
function setSens(s){applySens(s);}
function toggleAdv(){adv.style.display=adv.style.display==='block'?'none':'block';}
let autoOn=localStorage.getItem('auto')==='1';
function syncAuto(){document.getElementById('autoSw').classList.toggle('on',autoOn);
  document.getElementById('autoLabel').textContent=autoOn?'자동 촬영 켜짐':'자동 촬영 꺼짐';}
function toggleAuto(){autoOn=!autoOn;localStorage.setItem('auto',autoOn?'1':'0');syncAuto();}

/* ---------- audio ---------- */
let actx=null;
function ensureAudio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(actx&&actx.state==='suspended')actx.resume();return actx;}
const SYN={squeak:[1500,2400,160,'삑삑이'],meow:[640,440,320,'야옹'],bird:[2600,3300,180,'새소리'],bell:[900,1500,240,'초인종'],kiss:[1900,1200,150,'쪽쪽'],whistle:[1700,2700,280,'휘파람'],chirp:[3000,2300,120,'짹짹'],toy:[700,1150,180,'딸랑이'],click:[1200,1200,70,'딱딱'],boing:[380,950,240,'통통']};
const synthBuf={};
function getSynthBuf(name){const a=ensureAudio();if(!a)return null;
  if(synthBuf[name]&&synthBuf[name].sr===a.sampleRate)return synthBuf[name].buf;
  const[f1,f2,ms]=SYN[name],dur=ms/1000,sr=a.sampleRate,len=Math.max(1,Math.ceil(sr*dur)),buf=a.createBuffer(1,len,sr),ch=buf.getChannelData(0);
  let ph=0;for(let i=0;i<len;i++){const frac=i/len,f=f1+(f2-f1)*frac;ph+=2*Math.PI*f/sr;
    const env=Math.exp(-3.0*frac)*(frac<0.02?frac/0.02:1);ch[i]=Math.sin(ph)*0.5*env;}
  synthBuf[name]={buf,sr:a.sampleRate};return buf;}
function playSyn(name){const a=ensureAudio();if(!a)return;const b=getSynthBuf(name);if(!b)return;
  const s=a.createBufferSource();s.buffer=b;s.connect(a.destination);s.start();}
const voiceBuf={};
async function playVoice(v){const a=ensureAudio();if(!a)return;
  if(!voiceBuf[v.id]){try{const ab=await(await fetch(v.dataUrl)).arrayBuffer();voiceBuf[v.id]=await a.decodeAudioData(ab);}catch(e){new Audio(v.dataUrl).play();return;}}
  const s=a.createBufferSource();s.buffer=voiceBuf[v.id];s.connect(a.destination);s.start();}
let selectedSound=null,voicesCache=[];
let addedSounds=JSON.parse(localStorage.getItem('added')||'null')||['syn:squeak','syn:meow','syn:bird'];
const saveAdded=()=>localStorage.setItem('added',JSON.stringify(addedSounds));
function resumeCam(){const v=document.getElementById('video');if(v&&v.srcObject&&v.paused)v.play().catch(()=>{});}
async function refreshVoices(){voicesCache=await idbAll('voices');}
function sndForKey(key){if(key.indexOf('syn:')===0){const n=key.slice(4);return SYN[n]?{kind:'syn',name:n,key,label:SYN[n][3]}:null;}
  const id=key.slice(6),v=voicesCache.find(x=>x.id===id);return v?{kind:'voice',id,dataUrl:v.dataUrl,key,label:'🎵 '+v.name}:null;}
function previewSnd(s){ensureAudio();if(s)s.kind==='syn'?playSyn(s.name):playVoice(s);}
function playSelected(){previewSnd(selectedSound);}
function chooseSound(btn,snd){ensureAudio();
  if(selectedSound&&selectedSound.key===snd.key){selectedSound=null;btn&&btn.classList.remove('sel');return;}
  selectedSound=snd;document.querySelectorAll('#sounds .snd').forEach(b=>b.classList.remove('sel'));btn&&btn.classList.add('sel');playSelected();}
async function renderSounds(){await refreshVoices();const row=document.getElementById('sounds');if(!row)return;row.innerHTML='';
  addedSounds=addedSounds.filter(k=>sndForKey(k));saveAdded();
  addedSounds.forEach(k=>{const snd=sndForKey(k);const b=document.createElement('button');b.className='snd'+(selectedSound&&selectedSound.key===k?' sel':'');
    b.textContent=snd.label;b.onclick=()=>chooseSound(b,snd);row.appendChild(b);});
  const add=document.createElement('button');add.className='snd addsnd';add.textContent='＋ 소리';add.onclick=openSoundSheet;row.appendChild(add);}

async function openSoundSheet(){await refreshVoices();renderSoundSheet();document.getElementById('soundSheet').classList.add('on');}
function closeSoundSheet(){document.getElementById('soundSheet').classList.remove('on');resumeCam();}
function renderSoundSheet(){const box=document.getElementById('soundList');let h='<p class="lab">기본 소리 — 탭하면 추가/빼기 (소리도 들려요)</p><div class="edrow">';
  Object.keys(SYN).forEach(k=>{const key='syn:'+k,on=addedSounds.includes(key);
    h+=`<button class="chip ${on?'on':''}" onclick="toggleAdd('${key}')">${SYN[k][3]} ${on?'✓':'＋'}</button>`;});
  h+='</div><p class="lab" style="margin-top:14px">내 목소리</p>';
  if(voicesCache.length)voicesCache.forEach(v=>{const key='voice:'+v.id,on=addedSounds.includes(key);
    h+=`<div class="petrow"><span style="flex:1">🎵 ${v.name}</span>
      <button class="chip ${on?'on':''}" onclick="toggleAdd('${key}')">${on?'추가됨 ✓':'추가 ＋'}</button>
      <button class="chip vdelbtn" onclick="deleteVoice('${v.id}')">🗑️</button></div>`;});
  else h+='<p class="hint" style="margin:4px 0">아직 녹음이 없어요.</p>';
  h+='<button class="addbtn" id="recBtn" style="margin-top:12px" onclick="recordVoice()">🎤 새 목소리 녹음</button>';
  box.innerHTML=h;}
function toggleAdd(key){const i=addedSounds.indexOf(key);
  if(i>=0)addedSounds.splice(i,1);else{addedSounds.push(key);previewSnd(sndForKey(key));}
  saveAdded();renderSoundSheet();renderSounds();}
async function deleteVoice(id){if(!confirm('이 녹음을 삭제할까요?'))return;
  if(selectedSound&&selectedSound.key==='voice:'+id)selectedSound=null;
  const k='voice:'+id,i=addedSounds.indexOf(k);if(i>=0)addedSounds.splice(i,1);saveAdded();
  delete voiceBuf[id];await idbDel('voices',id);await refreshVoices();renderSoundSheet();renderSounds();resumeCam();}
let mediaRec=null,recChunks=[];
async function recordVoice(){const btn=document.getElementById('recBtn');
  if(mediaRec&&mediaRec.state==='recording'){mediaRec.stop();return;}
  const stream=video.srcObject,at=stream&&stream.getAudioTracks&&stream.getAudioTracks()[0];
  if(!at){toast('마이크를 못 써요. 카메라 권한에서 마이크도 허용해 주세요');return;}
  try{at.enabled=true;mediaRec=new MediaRecorder(new MediaStream([at]));recChunks=[];
    mediaRec.ondataavailable=e=>e.data.size&&recChunks.push(e.data);
    mediaRec.onstop=async()=>{at.enabled=false;const blob=new Blob(recChunks,{type:mediaRec.mimeType});
      const url=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const id='v'+Date.now(),n=(await idbAll('voices')).length+1;await idbPut('voices',{id,name:'목소리'+n,dataUrl:url});
      addedSounds.push('voice:'+id);saveAdded();mediaRec=null;await refreshVoices();renderSoundSheet();renderSounds();};
    btn&&(btn.classList.add('recording'),btn.textContent='■ 정지 (탭)');mediaRec.start();
    setTimeout(()=>{if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();},8000);}
  catch(e){at.enabled=false;mediaRec=null;toast('녹음을 시작하지 못했어요');}}

/* ---------- camera ---------- */
const video=document.getElementById('video'),overlay=document.getElementById('overlay'),octx=overlay.getContext('2d');
const statusEl=document.getElementById('status'),lockfill=document.getElementById('lockfill');
async function startCamera(){const hi={width:{ideal:1920},height:{ideal:1080}};
  const tries=[{video:{facingMode:{ideal:'environment'},...hi},audio:true},{video:{...hi},audio:true},
               {video:{facingMode:{ideal:'environment'},...hi}},{video:{...hi}},{video:true}];
  for(const c of tries){
  try{const s=await navigator.mediaDevices.getUserMedia(c);video.srcObject=s;video.muted=true;await video.play();
    const at=s.getAudioTracks&&s.getAudioTracks()[0];if(at)at.enabled=false; // mic off until recording
    return true;}catch(e){}}return false;}
const sc=document.createElement('canvas');sc.width=sc.height=160;const sctx=sc.getContext('2d',{willReadFrequently:true});
function sharpness(cv){sctx.drawImage(cv,0,0,160,160);const d=sctx.getImageData(0,0,160,160).data;const g=new Float32Array(160*160);
  for(let i=0;i<160*160;i++)g[i]=.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2];
  let s=0,sq=0,n=0;for(let y=1;y<159;y++)for(let x=1;x<159;x++){const i=y*160+x;const l=4*g[i]-g[i-1]-g[i+1]-g[i-160]-g[i+160];s+=l;sq+=l*l;n++;}const m=s/n;return Math.round(sq/n-m*m);}
const mc=document.createElement('canvas');mc.width=mc.height=64;const mctx=mc.getContext('2d',{willReadFrequently:true});
let prevGray=null;
function motion(){mctx.drawImage(video,0,0,64,64);const d=mctx.getImageData(0,0,64,64).data;const g=new Float32Array(64*64);
  for(let i=0;i<64*64;i++)g[i]=.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2];
  if(!prevGray){prevGray=g;return 999;}let diff=0;for(let i=0;i<g.length;i++)diff+=Math.abs(g[i]-prevGray[i]);prevGray=g;return diff/g.length;}
function grab(){const c=document.createElement('canvas');c.width=video.videoWidth;c.height=video.videoHeight;c.getContext('2d').drawImage(video,0,0);return c;}
function compress(cv,max=1600,q=.92){const s=Math.min(1,max/Math.max(cv.width,cv.height));const w=Math.round(cv.width*s),h=Math.round(cv.height*s);
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(cv,0,0,w,h);return c.toDataURL('image/jpeg',q);}

const SPECIES=['dog','cat','bird'];
let model,state='search',streakN=0,burst=[],lastShot=0,otherArmed=false;const BURST=6,COOLDOWN=2000;
function goodPet(preds){const fw=video.videoWidth,fh=video.videoHeight;let best=null,ba=0;
  for(const p of preds){if(!SPECIES.includes(p.class)||p.score<T.conf)continue;
    const[x,y,w,h]=p.bbox,area=(w*h)/(fw*fh);if(area<T.minArea)continue;
    const cx=(x+w/2)/fw-.5,cy=(y+h/2)/fh-.5;if(Math.hypot(cx,cy)>T.center)continue;if(area>ba){ba=area;best=p;}}return best;}
function drawBoxes(preds,locked){overlay.width=video.videoWidth;overlay.height=video.videoHeight;octx.clearRect(0,0,overlay.width,overlay.height);
  for(const p of preds){if(!SPECIES.includes(p.class))continue;const[x,y,w,h]=p.bbox;
    octx.strokeStyle=(locked===p)?'#5FC9A6':'rgba(255,255,255,.55)';octx.lineWidth=4;octx.beginPath();octx.roundRect(x,y,w,h,16);octx.stroke();}}
function clearOverlay(){overlay.width=video.videoWidth;overlay.height=video.videoHeight;octx.clearRect(0,0,overlay.width,overlay.height);}
function setStatus(t){statusEl.textContent=t;}
function anyModalOpen(){return['light','result','player','picker','petSheet','addSheet','soundSheet','editor','cropper'].some(id=>{const el=document.getElementById(id);return el&&el.classList.contains('on');});}

async function loop(){
  if(model&&video.readyState>=2){
    if(state==='capturing'){burst.push(grab());if(burst.length>=BURST)finishBurst();}
    else if(curTab==='cam'&&!anyModalOpen()){
      if(state==='cooldown'){const cd=(active()&&active().type==='other')?3500:COOLDOWN;if(Date.now()-lastShot>cd)state='search';}
      else{
        const p=active(),isOther=p&&p.type==='other';
        if(isOther){const mv=motion(),thr=sens==='high'?9:sens==='low'?4:6;
          const need=sens==='high'?28:sens==='low'?72:48;        // ~0.5~1.2s of stillness
          if(mv>thr*2.0)otherArmed=true;                          // a real movement must happen first
          if(autoOn&&mv<thr&&otherArmed){streakN++;lockfill.style.width=Math.min(100,streakN/need*100)+'%';
            setStatus('가만히… 찰칵 준비! '+Math.min(100,Math.round(streakN/need*100))+'%');
            if(streakN>=need){state='capturing';burst=[grab()];otherArmed=false;setStatus('찰칵! 연사 중');}}
          else{streakN=0;lockfill.style.width='0';setStatus(autoOn?(otherArmed?'가만히 있으면 찍어요':'아이가 움직이면 준비돼요'):'버튼을 눌러 촬영');}
          clearOverlay();}
        else{const preds=await model.detect(video),pet=goodPet(preds);
          if(autoOn&&pet){streakN++;setStatus('쳐다보는 중…');lockfill.style.width=Math.min(100,streakN/T.streak*100)+'%';
            if(streakN>=T.streak){state='capturing';burst=[grab()];setStatus('찰칵! 연사 중');}}
          else{streakN=0;lockfill.style.width='0';setStatus(autoOn?(pet?'쳐다보는 중…':'우리 아이 찾는 중…'):'버튼을 눌러 촬영');}
          drawBoxes(preds,pet);}
      }
    }
  }
  requestAnimationFrame(loop);
}
function finishBurst(){const frames=burst;burst=[];lastShot=Date.now();streakN=0;state='cooldown';lockfill.style.width='0';setStatus('베스트 컷 고르는 중…');
  let best=null,bs=-1;for(const f of frames){const s=sharpness(f);if(s>bs){bs=s;best=f;}}if(best)saveShot(best);}

async function saveShot(cv){const dataUrl=compress(cv);const pet=active();if(!pet){openAdd();return;}
  await idbPut('photos',{id:'p'+Date.now(),petId:pet.id,dataUrl,ts:Date.now()});
  const i=pets.findIndex(p=>p.id===pet.id);if(i>=0&&!pets[i].avatarUrl){pets[i].avatarUrl=await makeFaceAvatar(dataUrl);savePets();refreshHeader();}
  setStatus('앨범에 저장됐어요!');setTimeout(()=>{if(state!=='capturing')setStatus(autoOn?'우리 아이 찾는 중…':'버튼을 눌러 촬영');},1200);

function loadImg(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=src;});}
async function makeFaceAvatar(dataUrl){const img=await loadImg(dataUrl);let box=null;
  try{const preds=await model.detect(img);let ba=0;for(const p of preds){if(!SPECIES.includes(p.class))continue;const[x,y,w,h]=p.bbox;if(w*h>ba){ba=w*h;box=p.bbox;}}}catch(e){}
  const S=220,c=document.createElement('canvas');c.width=c.height=S;const ctx=c.getContext('2d');
  ctx.beginPath();ctx.arc(S/2,S/2,S/2,0,Math.PI*2);ctx.clip();let sx,sy,side;
  if(box){const[x,y,w,h]=box;side=Math.min(w,h)*0.95;sx=x+w/2-side/2;sy=y+h*0.30-side/2;
    sx=Math.max(0,Math.min(sx,img.naturalWidth-side));sy=Math.max(0,Math.min(sy,img.naturalHeight-side));}
  else{side=Math.min(img.naturalWidth,img.naturalHeight);sx=(img.naturalWidth-side)/2;sy=(img.naturalHeight-side)/2;}
  ctx.drawImage(img,sx,sy,side,side,0,0,S,S);return c.toDataURL('image/jpeg',.9);}

function attachPhotoHandlers(cell,p){let timer=null,longFired=false,sx=0,sy=0;
  const start=e=>{longFired=false;sx=e.clientX;sy=e.clientY;if(timer)clearTimeout(timer);
    timer=setTimeout(()=>{longFired=true;if(navigator.vibrate)navigator.vibrate(20);enterSelect(p.id);},420);};
  const move=e=>{if(Math.hypot(e.clientX-sx,e.clientY-sy)>10&&timer){clearTimeout(timer);timer=null;}};
  const stop=()=>{if(timer){clearTimeout(timer);timer=null;}};
  cell.addEventListener('pointerdown',start);cell.addEventListener('pointermove',move);
  cell.addEventListener('pointerup',stop);cell.addEventListener('pointercancel',stop);cell.addEventListener('pointerleave',stop);
  cell.onclick=()=>{if(longFired){longFired=false;return;}if(selectMode)toggleSelect(p.id);else openLight(p);};}

let curPhoto=null,curEnhancedUrl=null;
const PRESETS={standard:{shadow:.5,contrast:.12,warmth:.04,sat:.20},darkFur:{shadow:.72,contrast:.14,warmth:.05,sat:.22},lightFur:{shadow:.30,contrast:.10,warmth:.03,sat:.15}};
function openLight(p){curPhoto=p;curEnhancedUrl=null;lightImg.src=p.dataUrl;lightDl.href=p.dataUrl;lightDl.download='pet.jpg';
  document.querySelectorAll('.fx').forEach(b=>b.classList.remove('on'));document.getElementById('fxOff').classList.add('on');

function setFx(name,btn){document.querySelectorAll('.fx').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(!name){curEnhancedUrl=null;lightImg.src=curPhoto.dataUrl;lightDl.href=curPhoto.dataUrl;document.getElementById('saveFxBtn').style.display='none';return;}
  lightImg.style.opacity=.5;enhance(curPhoto.dataUrl,PRESETS[name]).then(url=>{curEnhancedUrl=url;lightImg.src=url;lightImg.style.opacity=1;
    lightDl.href=url;lightDl.download='pet_보정.jpg';document.getElementById('saveFxBtn').style.display='inline-block';});}
const clamp=v=>v<0?0:v>1?1:v;
const lift=(v,a)=>v+a*(Math.pow(v,.45)-v);
const scurve=(v,c)=>clamp(v+c*Math.sin((v-.5)*Math.PI));
function enhance(srcUrl,p){return new Promise(res=>{const img=new Image();img.onload=()=>{
  const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
  const im=ctx.getImageData(0,0,c.width,c.height),d=im.data;
  for(let i=0;i<d.length;i+=4){let r=d[i]/255,g=d[i+1]/255,b=d[i+2]/255;
    r=lift(r,p.shadow);g=lift(g,p.shadow);b=lift(b,p.shadow);r=scurve(r,p.contrast);g=scurve(g,p.contrast);b=scurve(b,p.contrast);
    r=clamp(r+p.warmth);b=clamp(b-p.warmth*.7);const lum=.299*r+.587*g+.114*b;
    r=clamp(lum+(r-lum)*(1+p.sat));g=clamp(lum+(g-lum)*(1+p.sat));b=clamp(lum+(b-lum)*(1+p.sat));d[i]=r*255;d[i+1]=g*255;d[i+2]=b*255;}
  ctx.putImageData(im,0,0);res(c.toDataURL('image/jpeg',.92));};img.src=srcUrl;});}

function mkCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function rrect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function cover(x,img,dx,dy,dw,dh){const ir=img.width/img.height,dr=dw/dh;let sw,sh,sx,sy;
  if(ir>dr){sh=img.height;sw=sh*dr;sx=(img.width-sw)/2;sy=0;}else{sw=img.width;sh=sw/dr;sx=0;sy=(img.height-sh)/2;}x.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);}

/* ---------- create tools ---------- */
/* shared: place image into a box using a normalized transform {scale,nx,ny} (resolution-independent) */
function placeImageN(x,img,bx,by,bw,bh,tf,clip){tf=tf||{scale:1,nx:0,ny:0};
  const base=Math.max(bw/img.width,bh/img.height),S=base*(tf.scale||1),dw=img.width*S,dh=img.height*S;
  const ox=(tf.nx||0)*Math.max(0,(dw-bw)/2),oy=(tf.ny||0)*Math.max(0,(dh-bh)/2);
  const dx=bx+(bw-dw)/2+ox,dy=by+(bh-dh)/2+oy;
  x.save();if(clip==='circle'){x.beginPath();x.arc(bx+bw/2,by+bh/2,Math.min(bw,bh)/2,0,7);x.clip();}else{rrect(x,bx,by,bw,bh,clip||0);x.clip();}
  x.drawImage(img,dx,dy,dw,dh);x.restore();}

/* ---------- per-cell cropper ---------- */
let cropCanvas=null;const crop={slots:[],idx:0,tf:[],cb:null,img:null,_wired:false};
async function startCrop(slots,cb){crop.slots=slots;crop.idx=0;crop.cb=cb;crop.tf=slots.map(()=>({scale:1,nx:0,ny:0}));
  cropCanvas=document.getElementById('cropCanvas');wireCrop();await loadSlot();document.getElementById('cropper').classList.add('on');}
async function loadSlot(){const s=crop.slots[crop.idx];crop.img=await loadImg(s.url);
  let w,h;if(s.aspect>=1){w=720;h=Math.round(720/s.aspect);}else{h=720;w=Math.round(720*s.aspect);}
  cropCanvas.width=w;cropCanvas.height=h;
  document.getElementById('cropZoom').value=Math.round(crop.tf[crop.idx].scale*100);
  document.getElementById('cropTitle').textContent=(s.name?s.name+' ':'')+'사진 맞추기 ('+(crop.idx+1)+'/'+crop.slots.length+')';
  document.getElementById('cropNext').textContent=crop.idx===crop.slots.length-1?'완료':'다음';
  drawCrop();}
function drawCrop(){const c=cropCanvas,x=c.getContext('2d'),s=crop.slots[crop.idx];x.fillStyle='#241c17';x.fillRect(0,0,c.width,c.height);
  placeImageN(x,crop.img,0,0,c.width,c.height,crop.tf[crop.idx],s.radius==='circle'?0:(s.radius||0),s.bg||'#FFF6EF');
  if(s.radius==='circle'){x.save();x.fillStyle='rgba(36,28,23,.5)';x.beginPath();x.rect(0,0,c.width,c.height);x.arc(c.width/2,c.height/2,Math.min(c.width,c.height)/2,0,7,true);x.fill('evenodd');
    x.strokeStyle='#fff';x.lineWidth=3;x.beginPath();x.arc(c.width/2,c.height/2,Math.min(c.width,c.height)/2,0,7);x.stroke();x.restore();}}
function cropZoomInput(v){crop.tf[crop.idx].scale=v/100;drawCrop();}
async function cropNext(){if(crop.idx<crop.slots.length-1){crop.idx++;await loadSlot();}else{document.getElementById('cropper').classList.remove('on');crop.cb(crop.tf.map(t=>({...t})));}}
function cropCancel(){document.getElementById('cropper').classList.remove('on');}
function wireCrop(){if(crop._wired)return;crop._wired=true;let drag=false,lx=0,ly=0;
  const pt=e=>{const r=cropCanvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(cropCanvas.width/r.width),y:(e.clientY-r.top)*(cropCanvas.height/r.height)};};
  cropCanvas.addEventListener('pointerdown',e=>{drag=true;const p=pt(e);lx=p.x;ly=p.y;cropCanvas.setPointerCapture(e.pointerId);cropCanvas.style.cursor='grabbing';});
  cropCanvas.addEventListener('pointermove',e=>{if(!drag)return;const p=pt(e),tf=crop.tf[crop.idx],bw=cropCanvas.width,bh=cropCanvas.height,img=crop.img;
    const base=Math.max(bw/img.width,bh/img.height),S=base*tf.scale,dw=img.width*S,dh=img.height*S;
    if(dw>bw)tf.nx=Math.max(-1,Math.min(1,tf.nx+(p.x-lx)/((dw-bw)/2)));
    if(dh>bh)tf.ny=Math.max(-1,Math.min(1,tf.ny+(p.y-ly)/((dh-bh)/2)));lx=p.x;ly=p.y;drawCrop();});
  const end=()=>{drag=false;cropCanvas.style.cursor='grab';};cropCanvas.addEventListener('pointerup',end);cropCanvas.addEventListener('pointercancel',end);}

/* ---------- create tools (with per-cell adjust) ---------- */
async function makeBirthday(){const p=needPet();if(!p)return;const ph=await photosFor(p.id);if(!ph.length){toast('사진을 먼저 찍어주세요');return;}
  openPicker({photos:ph,min:1,max:1,title:'생일 카드에 넣을 사진을 골라요',cb:s=>startCrop([{url:s[0].dataUrl,aspect:1,radius:'circle',bg:'#FFF6EF'}],tf=>renderBirthday(p,s[0].dataUrl,tf[0]))});}
async function renderBirthday(p,url,tf){await ensureFont();const img=await loadImg(url);const S=1080,c=mkCanvas(S,S),x=c.getContext('2d');
  x.fillStyle='#FFF6EF';x.fillRect(0,0,S,S);const cols=['#FF7E67','#5FC9A6','#FFC861','#ED93B1'];
  for(let i=0;i<46;i++){x.fillStyle=cols[i%4];x.globalAlpha=.85;x.beginPath();x.arc((i*131%S),(i*197%S),6+(i*13%14),0,7);x.fill();}x.globalAlpha=1;
  x.lineWidth=22;x.strokeStyle='#FF7E67';rrect(x,28,28,S-56,S-56,38);x.stroke();
  x.fillStyle='#5A463B';x.textAlign='center';x.font='400 84px "Jua",sans-serif';x.fillText('🎂 생일 축하해!',S/2,172);
  const R=290,cx=S/2,cy=502;placeImageN(x,img,cx-R,cy-R,R*2,R*2,tf,'circle','#FFF6EF');
  x.lineWidth=14;x.strokeStyle='#FFC861';x.beginPath();x.arc(cx,cy,R,0,7);x.stroke();
  x.fillStyle='#5A463B';x.font='400 96px "Jua",sans-serif';x.fillText(p.name,S/2,892);
  x.fillStyle='#FF7E67';x.font='400 56px "Jua",sans-serif';x.fillText('오늘 '+ageText(p)+'! 🐾',S/2,966);
  showResult(c.toDataURL('image/jpeg',.95),(p.name||'pet')+'_birthday.jpg');}

async function makeFourCut(){const p=needPet();if(!p)return;const ph=await photosFor(p.id);if(ph.length<4){toast('사진 4장 이상이 필요해요');return;}
  openPicker({photos:ph,min:4,max:4,title:'네컷에 넣을 사진 4장 (탭한 순서대로)',cb:s=>{const A=652/469;
    startCrop(s.map((it,i)=>({url:it.dataUrl,aspect:A,radius:16,bg:'#FF7E67',name:(i+1)+'번째'})),tf=>renderFourCut(p,s.map(x=>x.dataUrl),tf));}});}
async function renderFourCut(p,urls,tf){await ensureFont();const W=720,pad=34,gap=22,cell=Math.round((W-pad*2)*0.72);
  const H=pad+cell*4+gap*3+pad+50,c=mkCanvas(W,H),x=c.getContext('2d');x.fillStyle='#FF7E67';x.fillRect(0,0,W,H);
  for(let i=0;i<4;i++){const img=await loadImg(urls[i]);const y=pad+i*(cell+gap);placeImageN(x,img,pad,y,W-pad*2,cell,tf[i],16,'#FF7E67');}
  const t=new Date();x.fillStyle='#fff';x.textAlign='center';x.font='400 40px "Jua",sans-serif';x.fillText(p.name+' 🐾 '+t.getFullYear()+'.'+(t.getMonth()+1)+'.'+t.getDate(),W/2,H-22);
  showResult(c.toDataURL('image/jpeg',.95),(p.name||'pet')+'_4cut.jpg');}

/* ---------- sticker / decorate EDITOR ---------- */
const FRAMES={cream:{bg:'#FFF6EF',pad:90,border:16,line:'#fff'},white:{bg:'#FFFFFF',pad:64,border:0},
  coral:{bg:'#FF7E67',pad:80,border:0},mint:{bg:'#5FC9A6',pad:80,border:0},yellow:{bg:'#FFC861',pad:80,border:0},
  black:{bg:'#2A2320',pad:74,border:0},none:{bg:'#FFF6EF',pad:0,border:0}};
const STK={none:[],paws:['🐾'],hearts:['💕','💗','❤️'],stars:['⭐','🌟','✨'],party:['🎉','🎂','🎈','⭐'],
  flowers:['🌸','🌼','🌷'],music:['🎵','🎶'],bones:['🦴','🐾'],snow:['❄️','⛄','✨']};
const TEXTCOLORS=['#FF7E67','#5FC9A6','#FFC861','#5A463B','#FFFFFF','#ED93B1'];
const ed={pet:null,img:null,scale:1,ox:0,oy:0,frame:'cream',items:[],sel:-1};
const STKSET=['🐾','💕','💗','❤️','⭐','🌟','✨','🎉','🎂','🎈','🌸','🌼','🌷','🎵','🎶','🦴','❄️','⛄','😍','🥰','👑','🌈','☀️','🍖','🐶','🐱','🐹','🐢'];
let edCanvas=null,edWired=false,curEdTab='photo';

async function makeSticker(){const p=needPet();if(!p)return;const ph=await photosFor(p.id);if(!ph.length){toast('사진을 먼저 찍어주세요');return;}
  openPicker({photos:ph,min:1,max:1,title:'꾸밀 사진을 골라요',cb:async s=>{await openEditor(p,s[0].dataUrl);}});}
async function openEditor(pet,url){await ensureFont();ed.pet=pet;ed.img=await loadImg(url);
  ed.scale=1;ed.ox=0;ed.oy=0;ed.frame='cream';ed.items=[];ed.sel=-1;
  edCanvas=document.getElementById('edCanvas');wireEditor();document.getElementById('editor').classList.add('on');updateItemBar();edTab('photo');drawEditor();}
function closeEditor(){document.getElementById('editor').classList.remove('on');}

function wireEditor(){if(edWired)return;edWired=true;let mode=null,lx=0,ly=0,gx=0,gy=0;
  const pt=e=>{const r=edCanvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(1080/r.width),y:(e.clientY-r.top)*(1080/r.height)};};
  edCanvas.addEventListener('pointerdown',e=>{const p=pt(e);edCanvas.setPointerCapture(e.pointerId);lx=p.x;ly=p.y;
    if(ed.sel>=0&&ed.items[ed.sel]&&ed.items[ed.sel]._del){const d=ed.items[ed.sel]._del;if(Math.hypot(p.x-d.x,p.y-d.y)<=d.r){edItemDelete();mode=null;return;}}
    const h=edHit(p);
    if(h>=0){ed.sel=h;const it=ed.items[h];gx=p.x-it.x;gy=p.y-it.y;mode='item';}else{ed.sel=-1;mode='photo';}
    updateItemBar();drawEditor();});
  edCanvas.addEventListener('pointermove',e=>{if(!mode)return;const p=pt(e);
    if(mode==='item'){const it=ed.items[ed.sel];it.x=p.x-gx;it.y=p.y-gy;}else{ed.ox+=p.x-lx;ed.oy+=p.y-ly;}lx=p.x;ly=p.y;drawEditor();});
  const end=()=>{mode=null;};edCanvas.addEventListener('pointerup',end);edCanvas.addEventListener('pointercancel',end);}
function edHit(p){for(let i=ed.items.length-1;i>=0;i--){const bb=ed.items[i]._bb;if(bb&&p.x>=bb.x-14&&p.x<=bb.x+bb.w+14&&p.y>=bb.y-14&&p.y<=bb.y+bb.h+14)return i;}return -1;}

function drawEditor(){if(!edCanvas)return;const x=edCanvas.getContext('2d'),S=1080,F=FRAMES[ed.frame];
  x.clearRect(0,0,S,S);x.fillStyle=F.bg;x.fillRect(0,0,S,S);
  const bx=F.pad,by=F.pad,bw=S-2*F.pad,bh=S-2*F.pad;
  const img=ed.img,base=Math.max(bw/img.width,bh/img.height),s=base*ed.scale,dw=img.width*s,dh=img.height*s;
  let dx=bx+(bw-dw)/2+ed.ox,dy=by+(bh-dh)/2+ed.oy;
  dx=Math.min(bx,Math.max(bx+bw-dw,dx));dy=Math.min(by,Math.max(by+bh-dh,dy));
  ed.ox=dx-(bx+(bw-dw)/2);ed.oy=dy-(by+(bh-dh)/2);
  x.save();rrect(x,bx,by,bw,bh,F.pad?28:0);x.clip();x.drawImage(img,dx,dy,dw,dh);x.restore();
  if(F.border){x.lineWidth=F.border;x.strokeStyle=F.line;rrect(x,bx,by,bw,bh,28);x.stroke();}
  ed.items.forEach(it=>drawItem(x,it));
  const sel=ed.items[ed.sel];
  if(sel&&sel._bb){const bb=sel._bb;x.save();x.strokeStyle='#FF7E67';x.lineWidth=4;x.setLineDash([12,8]);
    rrect(x,bb.x-12,bb.y-12,bb.w+24,bb.h+24,14);x.stroke();x.setLineDash([]);
    const hx=bb.x+bb.w+12,hy=bb.y-12;x.fillStyle='#FF7E67';x.beginPath();x.arc(hx,hy,30,0,7);x.fill();
    x.fillStyle='#fff';x.font='700 36px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText('×',hx,hy-1);x.textBaseline='alphabetic';
    sel._del={x:hx,y:hy,r:40};x.restore();}}
function drawItem(x,it){
  if(it.kind==='sticker'){x.textAlign='center';x.textBaseline='middle';x.font=`${it.size}px "Jua",sans-serif`;
    x.fillText(it.emoji,it.x,it.y);it._bb={x:it.x-it.size/2,y:it.y-it.size/2,w:it.size,h:it.size};x.textBaseline='alphabetic';}
  else{x.textAlign='center';x.font=`400 ${it.size}px "Jua",sans-serif`;const lines=wrapText(x,it.text||' ',640),lh=it.size*1.2;
    const tw=Math.max(12,...lines.map(l=>x.measureText(l).width)),th=lines.length*lh,pad=it.style==='speech'?34:14,bw=tw+pad*2,bh=th+pad*2,bx=it.x-bw/2,by=it.y-bh/2;
    if(it.style==='speech'){x.fillStyle='#fff';rrect(x,bx,by,bw,bh,28);x.fill();
      x.beginPath();x.moveTo(it.x-22,by+bh);x.lineTo(it.x+4,by+bh+38);x.lineTo(it.x+34,by+bh);x.closePath();x.fill();}
    x.fillStyle=(it.style==='speech'&&it.color==='#FFFFFF')?'#FF7E67':it.color;x.textBaseline='middle';
    lines.forEach((l,i)=>x.fillText(l,it.x,by+pad+lh/2+i*lh));x.textBaseline='alphabetic';it._bb={x:bx,y:by,w:bw,h:bh};}}
function wrapText(x,text,maxW){const out=[];String(text).split('\n').forEach(par=>{const words=par.split(/\s+/);let cur='';
  for(const w of words){const t=cur?cur+' '+w:w;if(x.measureText(t).width>maxW&&cur){out.push(cur);cur=w;}else cur=t;}out.push(cur);});return out.length?out:[text];}

/* item controls */
function updateItemBar(){const bar=document.getElementById('edItemBar');if(bar)bar.style.display=ed.sel>=0?'flex':'none';}
function edItemSize(d){const it=ed.items[ed.sel];if(!it)return;it.size=Math.max(28,Math.min(440,it.size+d));drawEditor();}
function edItemDelete(){if(ed.sel<0)return;ed.items.splice(ed.sel,1);ed.sel=-1;updateItemBar();drawEditor();if(curEdTab==='text')edTab('text');}
function edAddSticker(em){ed.items.push({kind:'sticker',emoji:em,x:540,y:540,size:150});ed.sel=ed.items.length-1;updateItemBar();drawEditor();}
function curText(){const it=ed.items[ed.sel];return it&&it.kind==='text'?it:null;}
function edAddText(){ed.items.push({kind:'text',text:'',x:540,y:300,size:66,color:'#FF7E67',style:'plain'});ed.sel=ed.items.length-1;updateItemBar();edTab('text');drawEditor();}
function edTextInput(v){let it=curText();if(!it){ed.items.push({kind:'text',text:'',x:540,y:300,size:66,color:'#FF7E67',style:'plain'});ed.sel=ed.items.length-1;it=ed.items[ed.sel];updateItemBar();}it.text=v;drawEditor();}
function edTextBubble(){const it=curText();if(!it)return;it.style=it.style==='speech'?'plain':'speech';drawEditor();syncText();}
function edTextColor(c){const it=curText();if(!it)return;it.color=c;drawEditor();syncText();}
function syncText(){const it=curText();document.querySelectorAll('#edPanel [data-col]').forEach(b=>b.classList.toggle('on',!!it&&b.dataset.col===it.color));
  const bb=document.getElementById('edBubbleBtn');if(bb)bb.classList.toggle('on',!!it&&it.style==='speech');}

function edTab(p){curEdTab=p;document.querySelectorAll('.edtab').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  const el=document.getElementById('edPanel');let h='';
  if(p==='photo'){h=`<p class="lab">사진을 드래그해 위치를 옮기고, 슬라이더로 확대해요</p>
    <input type="range" min="100" max="320" value="${Math.round(ed.scale*100)}" oninput="ed.scale=this.value/100;drawEditor();">`;}
  else if(p==='frame'){const names={cream:'크림',white:'화이트',coral:'코랄',mint:'민트',yellow:'옐로',black:'블랙',none:'없음'};
    h='<p class="lab">프레임</p><div class="edrow">'+Object.keys(FRAMES).map(k=>`<button class="chip ${ed.frame===k?'on':''}" onclick="ed.frame='${k}';edTab('frame');drawEditor();">${names[k]}</button>`).join('')+'</div>';}
  else if(p==='sticker'){h='<p class="lab">탭하면 사진 위에 올라가요. 손으로 끌어 옮기고, 위 막대로 크기·삭제!</p><div class="hrow">'+
    STKSET.map(e=>`<button class="chip emojibtn" onclick="edAddSticker('${e}')">${e}</button>`).join('')+'</div>';}
  else if(p==='text'){const it=curText();
    h=`<input class="tinput" id="edTextInput" placeholder="글씨를 입력하세요 (예: 사랑해 ♥)" value="${it?String(it.text||'').replace(/"/g,'&quot;'):''}" oninput="edTextInput(this.value)">
    <div class="edrow" style="margin-top:10px">
      <button class="chip" onclick="edAddText()">＋ 새 글씨</button>
      <button class="chip ${it&&it.style==='speech'?'on':''}" id="edBubbleBtn" onclick="edTextBubble()">💬 말풍선</button>
    </div><p class="lab" style="margin-top:10px">색</p><div class="edrow">`+
    TEXTCOLORS.map(c=>`<button class="sw-color ${it&&it.color===c?'on':''}" data-col="${c}" style="background:${c}" onclick="edTextColor('${c}')"></button>`).join('')+
    `</div><p class="hint" style="margin-top:8px">글씨를 손으로 끌어 원하는 곳에 두세요.</p>`;}
  el.innerHTML=h;}
function saveEditor(){ed.sel=-1;updateItemBar();drawEditor();const url=edCanvas.toDataURL('image/jpeg',.95);closeEditor();showResult(url,(ed.pet.name||'pet')+'_꾸미기.jpg');}

/* highlight */
let hlRAF=null,hlMusic=null,hlImgs=[],hlPet=null;
async function makeHighlight(){const p=needPet();if(!p)return;const ph=await photosFor(p.id);if(ph.length<2){toast('사진 2장 이상이 필요해요');return;}
  openPicker({photos:ph,min:2,max:12,title:'영상에 넣을 사진 (2~12장, 탭한 순서대로)',cb:async s=>{await ensureFont();hlImgs=[];for(const it of s)hlImgs.push(await loadImg(it.dataUrl));hlPet=p;
    const canRec=!!(document.getElementById('plCanvas').captureStream&&window.MediaRecorder);
    document.getElementById('plSave').style.display=canRec?'inline-block':'none';document.getElementById('recHint').textContent='';
    document.getElementById('player').classList.add('on');playHighlight();}});}
function playHighlight(){const c=document.getElementById('plCanvas'),x=c.getContext('2d'),S=c.width,DUR=2100,FADE=480;let idx=0,t0=performance.now();stopHighlight();startMusic();
  function zoom(img,z){const s=Math.min(img.width,img.height),sx=(img.width-s)/2,sy=(img.height-s)/2,d=S*z,off=(d-S)/2;x.drawImage(img,sx,sy,s,s,-off,-off,d,d);}
  function cap(){const n=hlPet.name+' 🐾';x.font='400 46px "Jua",sans-serif';x.textAlign='left';x.textBaseline='middle';const w=x.measureText(n).width+40;
    x.fillStyle='rgba(0,0,0,.42)';rrect(x,28,S-94,w,60,30);x.fill();x.fillStyle='#fff';x.fillText(n,50,S-64);x.textBaseline='alphabetic';}
  function frame(now){const el=now-t0;x.fillStyle='#000';x.fillRect(0,0,S,S);zoom(hlImgs[idx%hlImgs.length],1.04+0.12*Math.min(el/DUR,1));
    if(el>DUR-FADE){x.globalAlpha=(el-(DUR-FADE))/FADE;zoom(hlImgs[(idx+1)%hlImgs.length],1.04);x.globalAlpha=1;}cap();if(el>=DUR){idx++;t0=now;}hlRAF=requestAnimationFrame(frame);}
  hlRAF=requestAnimationFrame(frame);}
function startMusic(){stopMusic();const a=ensureAudio();if(!a)return;const notes=[523,659,784,659,587,698,880,698];let i=0;
  hlMusic=setInterval(()=>{const o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=notes[i%notes.length];
    g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(.10,a.currentTime+.04);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.45);
    o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+.45);i++;},430);}
function stopMusic(){if(hlMusic){clearInterval(hlMusic);hlMusic=null;}}
function stopHighlight(){if(hlRAF){cancelAnimationFrame(hlRAF);hlRAF=null;}stopMusic();}
function closePlayer(){stopHighlight();document.getElementById('player').classList.remove('on');}
function saveHighlightVideo(){const c=document.getElementById('plCanvas');if(!c.captureStream||!window.MediaRecorder){toast('이 브라우저는 영상 저장을 지원하지 않아요');return;}
  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];let mime='video/webm';for(const m of mimes)if(MediaRecorder.isTypeSupported(m)){mime=m;break;}
  const rec=new MediaRecorder(c.captureStream(30),{mimeType:mime});const chunks=[];rec.ondataavailable=e=>e.data.size&&chunks.push(e.data);
  rec.onstop=()=>{const blob=new Blob(chunks,{type:mime}),url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(hlPet&&hlPet.name||'pet')+'_highlight.webm';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),6000);document.getElementById('recHint').textContent='저장됐어요! 🎬';};
  const dur=Math.min(hlImgs.length,12)*2100+300;rec.start();document.getElementById('recHint').textContent='영상 만드는 중… ('+Math.round(dur/1000)+'초)';
  setTimeout(()=>{try{rec.stop();}catch(e){}},dur);}

function checkBirthday(){const b=document.getElementById('bdayBanner');if(!b)return;const p=active();
  if(p&&p.birthMs){const d=new Date(p.birthMs),n=new Date();if(d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()){b.innerHTML='🎂 오늘 '+p.name+' 생일! 카드 만들기 →';b.style.display='block';return;}}
  b.style.display='none';}

(async function(){
  await openDB();applySens(sens);syncAuto();await renderSounds();refreshHeader();
  if(pets.length===0)openAdd();

  if(!ok){document.getElementById('loading').innerHTML='카메라 권한이 필요해요.<br>HTTPS나 localhost에서 열어주세요.';return;}
  try{model=await cocoSsd.load({base:'lite_mobilenet_v2'});}
  catch(e){document.getElementById('loading').innerHTML='AI 모델을 못 불러왔어요.<br>인터넷 연결을 확인해 주세요.';return;}
  document.getElementById('loading').style.display='none';setStatus(autoOn?'우리 아이 찾는 중…':'버튼을 눌러 촬영');loop();
})();
